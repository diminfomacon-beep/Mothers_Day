<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Father's Day Product Option Selector</title>

    <style>
        body { 
            font-family: sans-serif; 
            padding: 15px; 
            background: #fff; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .button-container {
            padding: 20px;
            width: 100%;
            max-width: 320px;
            box-sizing: border-box;
        }

        .product-info {
            text-align: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 12px;
        }

        .product-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin: 0 0 8px 0;
        }

        .product-price {
            font-size: 16px;
            color: #2F6B64;
            font-weight: bold;
            margin: 0;
        }

        .input-group { margin-bottom: 15px; }

        .input-group label { 
            display: block; 
            font-size: 12px; 
            font-weight: bold; 
            margin-bottom: 6px; 
            color: #555; 
        }

        .input-group select,
        .input-group input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 14px; 
        }

        #add-to-cart-btn { 
            background: #2b7bf5; 
            color: white; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
        }
    </style>
</head>

<body>

<div class="button-container">

    <div class="product-info">
        <p class="product-name" id="display-name">Loading Item...</p>
        <p class="product-price" id="display-price">$0.00</p>
    </div>

    <div id="dynamic-variants-container"></div>

    <div class="input-group">
        <label>Design Code:</label>
        <input type="text" id="design-code" placeholder="e.g. FD-05">
    </div>

    <button id="add-to-cart-btn">Add to Cart</button>

</div>

<script>

const urlParams = new URLSearchParams(window.location.search);

const rawName = urlParams.get('name') || 'Custom Item';

const rawPrice = Number(
    (urlParams.get('price') || "0").replace(/,/g,'')
);

const rawVars = urlParams.get('vars')
    ? decodeURIComponent(urlParams.get('vars')).replace(/\+/g,' ').trim()
    : '';

const itemName = rawName.replace(/_/g,' ');

document.getElementById('display-name').textContent = itemName;

document.getElementById('display-price').textContent = `$${rawPrice.toFixed(2)}`;

const variantContainer = document.getElementById('dynamic-variants-container');


// =========================
// VARIANT PARSER (FIXED)
// =========================

if (rawVars) {

    const categories = rawVars.split('|||');

    categories.forEach(cat => {

        cat = cat.trim();
        if (!cat) return;

        const groupDiv = document.createElement('div');
        groupDiv.className = 'input-group';

        let labelText = "Options";
        let optionsText = cat;

        if (cat.includes(':')) {
            const parts = cat.split(/:(.+)/);
            labelText = parts[0].trim();
            optionsText = parts[1].trim();
        }

        const rawOptions = optionsText.split(',');

        const label = document.createElement('label');
        label.textContent = labelText;

        const select = document.createElement('select');
        select.className = 'variant-selector';
        select.dataset.variantName = labelText;

        rawOptions.forEach(opt => {

            opt = opt.trim();
            if (!opt) return;

            const pieces = opt.split('|');

            const name = pieces[0]?.trim();
            if (!name) return;

            const price = parseFloat(pieces[1]) || 0;

            const option = document.createElement('option');
            option.value = name;
            option.dataset.priceModifier = price;

            option.textContent = price > 0
                ? `${name} (+$${price})`
                : name;

            select.appendChild(option);
        });

        groupDiv.appendChild(label);
        groupDiv.appendChild(select);
        variantContainer.appendChild(groupDiv);
    });
}


// =========================
// ADD TO CART (FIXED SAFE)
// =========================

document.getElementById('add-to-cart-btn').onclick = () => {

    const chosenDesign =
        document.getElementById('design-code').value.trim();

    if (!chosenDesign) {
        alert("Enter design code");
        return;
    }

    let selectedVariants = [];

    let totalPrice = Number.isFinite(rawPrice) ? rawPrice : 0;

    const dropdowns = document.querySelectorAll('.variant-selector');

    dropdowns.forEach(dropdown => {

        const opt = dropdown.options[dropdown.selectedIndex];
        if (!opt) return;

        const modifier = parseFloat(opt.dataset.priceModifier) || 0;

        totalPrice += modifier;

        selectedVariants.push(
            `${dropdown.dataset.variantName}: ${opt.value}`
        );
    });

    const finalDetails =
        selectedVariants.join(', ') +
        ` | Design: ${chosenDesign}`;

    let finalCart =
        JSON.parse(localStorage.getItem('final_shopping_cart')) || [];

    finalCart.push({
        name: itemName,
        price: parseFloat(totalPrice) || 0,
        details: finalDetails,
        qty: 1
    });

    localStorage.setItem(
        'final_shopping_cart',
        JSON.stringify(finalCart)
    );

    window.location.href = '/cart';
};

</script>

</body>
</html>
