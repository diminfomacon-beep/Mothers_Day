<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Father's Day Product Option Selector</title>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 15px; 
            background: #fff; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .button-container {
            padding: 20px;
            width: 100%;
            max-width: 320px;
            box-sizing: border-box;
        }
        .product-info {
            text-align: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 12px;
        }
        .product-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin: 0 0 8px 0;
        }
        .product-price {
            font-size: 16px;
            color: #2F6B64;
            font-weight: bold;
            margin: 0;
        }
        .input-group { 
            margin-bottom: 15px; 
        }
        .input-group label { 
            display: block; 
            font-size: 12px; 
            font-weight: bold; 
            margin-bottom: 6px; 
            color: #555; 
            text-transform: capitalize;
        }
        .input-group select, .input-group input { 
            width: 100%; 
            padding: 10px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 14px; 
            background-color: white;
        }
        #error-msg {
            color: #dc3545;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 12px;
            display: none;
        }
        #add-to-cart-btn { 
            background: #2b7bf5; 
            color: white; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px;
            transition: background 0.2s;
        }
        #add-to-cart-btn:hover {
            background: #2b68c4;
        }
        /* Style for when the item is successfully added */
        #add-to-cart-btn.success {
            background: #28a745 !important;
        }
    </style>
</head>
<body>

    <div class="button-container">
        <div class="product-info">
            <p class="product-name" id="display-name">Loading Item...</p>
            <p class="product-price" id="display-price">$0.00</p>
        </div>

        <div id="dynamic-variants-container"></div>

        <div class="input-group">
            <label for="design-code">Enter Chosen Design Style Code:</label>
            <input type="text" id="design-code" placeholder="e.g., FD-05" autocomplete="off">
        </div>

        <div id="error-msg"></div>

        <button id="add-to-cart-btn">Add to Cart</button>
    </div>

    <script>

    // =========================
    // URL VARIABLES
    // =========================
    const urlParams = new URLSearchParams(window.location.search);
    const rawName = urlParams.get('name') || "Father's Day Box";
    const rawPrice = Number((urlParams.get('price') || "0").replace(/,/g, ''));
    const rawVars = urlParams.get('vars') ? decodeURIComponent(urlParams.get('vars')).replace(/\+/g, ' ').trim() : '';

    // =========================
    // PRODUCT DISPLAY
    // =========================
    const itemName = rawName.replace(/_/g, ' ');
    document.getElementById('display-name').textContent = itemName;
    document.getElementById('display-price').textContent = `$${rawPrice.toFixed(2)}`;

    // =========================
    // PARSE VARIANTS
    // =========================
    const variantContainer = document.getElementById('dynamic-variants-container');

    if (rawVars && rawVars !== '') {
        const categories = rawVars.split('|||');

        categories.forEach(cat => {
            cat = cat.trim();
            if (!cat) return;

            const groupDiv = document.createElement('div');
            groupDiv.className = 'input-group';

            let labelText = "Options";
            let optionsText = cat;

            if (cat.includes(':')) {
                const parts = cat.split(/:(.+)/);
                labelText = parts[0].trim();
                optionsText = parts[1].trim();
            }

            const rawOptions = optionsText.split(',');
            const label = document.createElement('label');
            label.textContent = labelText + ":";

            const select = document.createElement('select');
            select.className = 'variant-selector';
            select.dataset.variantName = labelText;

            let hasValidOptions = false;

            rawOptions.forEach(opt => {
                opt = opt.trim();
                if (!opt) return;

                const pieces = opt.split('|');
                const optionName = pieces[0]?.trim();
                if (!optionName) return;

                const optionPrice = parseFloat(pieces[1]) || 0;
                const optionElement = document.createElement('option');
                optionElement.value = optionName;
                optionElement.dataset.priceModifier = optionPrice;

                optionElement.textContent = optionPrice > 0 ? `${optionName} (+$${optionPrice})` : optionName;
                select.appendChild(optionElement);
                hasValidOptions = true;
            });

            if (hasValidOptions) {
                groupDiv.appendChild(label);
                groupDiv.appendChild(select);
                variantContainer.appendChild(groupDiv);
            }
        });
    }

    // =========================
    // ADD TO CART & REDIRECT
    // =========================
    document.getElementById('add-to-cart-btn').onclick = function() {
        const btn = this;
        const errorEl = document.getElementById('error-msg');
        errorEl.style.display = "none"; 

        const chosenDesign = document.getElementById('design-code').value.trim();

        if (!chosenDesign) {
            errorEl.textContent = "Please enter your chosen design style code first!";
            errorEl.style.display = "block";
            return;
        }

        let totalPrice = isNaN(rawPrice) ? 0 : rawPrice;
        let selectedVariants = [];
        let varietyValue = "";
        let addonsValue = "";

        const dropdowns = document.querySelectorAll('.variant-selector') || [];
        dropdowns.forEach(dropdown => {
            const selectedOption = dropdown.options[dropdown.selectedIndex];
            const modifier = parseFloat(selectedOption.dataset.priceModifier) || 0;
            const categoryName = dropdown.dataset.variantName;
            const chosenVal = selectedOption.value;

            totalPrice += modifier;
            selectedVariants.push(`${categoryName}: ${chosenVal}`);

            if (categoryName.toLowerCase() === 'variety' || categoryName.toLowerCase() === 'size' || categoryName.toLowerCase() === 'type') {
                varietyValue = chosenVal;
            } else {
                if (addonsValue) {
                    addonsValue += `, ${chosenVal}`;
                } else {
                    addonsValue = chosenVal;
                }
            }
        });

        let finalDetails = selectedVariants.join(', ');
        if (finalDetails) {
            finalDetails += ` | Design: ${chosenDesign}`;
        } else {
            finalDetails = `Design: ${chosenDesign}`;
        }

        if (!itemName) {
            errorEl.textContent = "Product configuration error. Please refresh.";
            errorEl.style.display = "block";
            return;
        }

        let finalCart = [];
        try {
            finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
        } catch(e) {}

        finalCart.push({
            name: itemName,
            price: Number(totalPrice) || 0,
            details: finalDetails,
            variety: varietyValue,
            addons: addonsValue,
            qty: 1
        });

        try {
            localStorage.setItem('final_shopping_cart', JSON.stringify(finalCart));
        } catch(e) {}

        // --- GOOGLE SITES FIX & TEXT TRANSITION ---
        
        // 1. Instantly switch button to "Added!" green state
        btn.textContent = "Added!";
        btn.classList.add('success');
        btn.disabled = true;

        // 2. Clear input field ready for next action
        document.getElementById('design-code').value = "";

        // 3. Reset the button back to its standard look after 2 seconds
        setTimeout(() => {
            btn.textContent = "Add to Cart";
            btn.classList.remove('success');
            btn.disabled = false;
        }, 2000);

        // 4. Force Google Sites window to load checkout page globally
        // Change the URL below to match the real production domain address of your checkout page
        setTimeout(() => {
            window.top.location.href = "https://diminfomacon-beep.github.io/Mothers_Day/checkout.html";
        }, 800);
    };

</script>
</body>
</html>
