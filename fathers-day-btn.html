<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: sans-serif; 
            padding: 15px; 
            background: #b6d9e4; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .button-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 320px;
            box-sizing: border-box;
        }
        .product-info {
            text-align: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 12px;
        }
        .product-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin: 0 0 8px 0;
        }
        .product-price {
            font-size: 16px;
            color: #2F6B64;
            font-weight: bold;
            margin: 0;
        }
        /* Styles for the Dynamic Dropdowns and Input Box */
        .input-group { 
            margin-bottom: 15px; 
        }
        .input-group label { 
            display: block; 
            font-size: 12px; 
            font-weight: bold; 
            margin-bottom: 6px; 
            color: #555; 
            text-transform: capitalize;
        }
        .input-group select, .input-group input { 
            width: 100%; 
            padding: 10px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 14px; 
            background-color: white;
        }
        #add-to-cart-btn { 
            background: #2F6B64; 
            color: white; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px;
            transition: background 0.2s;
        }
        #add-to-cart-btn:hover {
            background: #23524b;
        }
    </style>
</head>
<body>

    <div class="button-container">
        <div class="product-info">
            <p class="product-name" id="display-name">Loading Item...</p>
            <p class="product-price" id="display-price">$0.00</p>
        </div>

        <!-- Container where dropdowns will be built dynamically -->
        <div id="dynamic-variants-container"></div>

        <!-- Design Code Input -->
        <div class="input-group">
            <label for="design-code">Enter Chosen Design Style Code:</label>
            <input type="text" id="design-code" placeholder="e.g., FD-05" autocomplete="off">
        </div>

        <!-- Action Button -->
        <button id="add-to-cart-btn">Add to Cart</button>
    </div>

    <script>
        // 1. Grab data out of the URL parameters coming from Google Sheets
        const urlParams = new URLSearchParams(window.location.search);
        const rawName = urlParams.get('name') || 'Custom Item';
        const rawPrice = parseFloat(urlParams.get('price')) || 0.00;
        const rawVars = urlParams.get('vars') ? decodeURIComponent(urlParams.get('vars')) : '';

        const itemName = rawName.replace(/_/g, ' ');

        // Inject core details
        document.getElementById('display-name').textContent = itemName;
        document.getElementById('display-price').textContent = `$${rawPrice.toFixed(2)}`;

        // 2. Parse rawVars string and dynamically create dropdown menus
        // Expected format: "Size: Small, Medium, Large | Color: Black, White" or "Size: S, M, L"
        const variantContainer = document.getElementById('dynamic-variants-container');
        
        if (rawVars && rawVars.trim() !== "") {
            // Split options by the pipe character | or comma if it's multiple categories
            const categories = rawVars.split(/[|;\n]/); 
            
            categories.forEach(cat => {
                if (!cat.includes(':')) return;
                
                const parts = cat.split(':');
                const labelText = parts[0].trim();
                const optionsText = parts[1].trim();
                const optionsArray = optionsText.split(',').map(o => o.trim());

                // Create the element structure for a dropdown selection group
                const groupDiv = document.createElement('div');
                groupDiv.className = 'input-group';

                const label = document.createElement('label');
                label.textContent = labelText + ":";
                
                const select = document.createElement('select');
                select.className = 'variant-selector';
                select.dataset.variantName = labelText;

                optionsArray.forEach(opt => {
                    const optionElement = document.createElement('option');
                    optionElement.value = opt;
                    optionElement.textContent = opt;
                    select.appendChild(optionElement);
                });

                groupDiv.appendChild(label);
                groupDiv.appendChild(select);
                variantContainer.appendChild(groupDiv);
            });
        }

        // 3. Handle Cart Pushing on Click
        document.getElementById('add-to-cart-btn').onclick = () => {
            const chosenDesign = document.getElementById('design-code').value.trim();
            
            if (!chosenDesign) {
                alert("Please look at the template and type your chosen design style code first!");
                return;
            }

            // Gather up what choices the customer actually made in the generated dropdowns
            let selectedVariants = [];
            const dropdowns = document.querySelectorAll('.variant-selector');
            dropdowns.forEach(dropdown => {
                selectedVariants.push(`${dropdown.dataset.variantName}: ${dropdown.value}`);
            });

            // Combine dropdown selections with the design style code selection
            let finalDetails = selectedVariants.join(', ');
            if (finalDetails) {
                finalDetails += ` | Design: ${chosenDesign}`;
            } else {
                finalDetails = `Design Style: ${chosenDesign}`;
            }

            // Grab the final shopping cart array from localStorage
            let finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
            
            // Push the item as its own clean line-item configuration
            finalCart.push({ 
                name: itemName, 
                price: rawPrice, 
                details: finalDetails, 
                qty: 1 
            });

            // Save and redirect out to your main shopping cart page
            localStorage.setItem('final_shopping_cart', JSON.stringify(finalCart));
            window.location.href = '/cart'; 
        };
    </script>
</body>
</html>
