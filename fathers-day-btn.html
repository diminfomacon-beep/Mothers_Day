<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Father's Day Product Option Selector</title>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 15px; 
            background: #b6d9e4; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .button-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 320px;
            box-sizing: border-box;
        }
        .product-info {
            text-align: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 12px;
        }
        .product-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin: 0 0 8px 0;
        }
        .product-price {
            font-size: 16px;
            color: #2F6B64;
            font-weight: bold;
            margin: 0;
        }
        /* Styles for Input and Dropdown Fields */
        .input-group { 
            margin-bottom: 15px; 
        }
        .input-group label { 
            display: block; 
            font-size: 12px; 
            font-weight: bold; 
            margin-bottom: 6px; 
            color: #555; 
            text-transform: capitalize;
        }
        .input-group select, .input-group input { 
            width: 100%; 
            padding: 10px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 14px; 
            background-color: white;
        }
        .static-variant-text {
            font-size: 13px; 
            color: #666; 
            margin: 5px 0; 
            font-style: italic; 
            text-align: center;
            background: #f9f9f9;
            padding: 8px;
            border-radius: 4px;
            border: 1px dashed #ddd;
        }
        #add-to-cart-btn { 
            background: #2F6B64; 
            color: white; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px;
            transition: background 0.2s;
        }
        #add-to-cart-btn:hover {
            background: #23524b;
        }
    </style>
</head>
<body>

    <div class="button-container">
        <div class="product-info">
            <p class="product-name" id="display-name">Loading Item...</p>
            <p class="product-price" id="display-price">$0.00</p>
        </div>

        <div id="dynamic-variants-container"></div>

        <div class="input-group">
            <label for="design-code">Enter Chosen Design Style Code:</label>
            <input type="text" id="design-code" placeholder="e.g., FD-05" autocomplete="off">
        </div>

        <button id="add-to-cart-btn">Add to Cart</button>
    </div>

    <script>
        // 1. Pull core variables out of the Google Sheet macro generated link
        const urlParams = new URLSearchParams(window.location.search);
        const rawName = urlParams.get('name') || 'Custom Item';
        const rawPrice = parseFloat(urlParams.get('price')) || 0.00;
        const rawVars = urlParams.get('vars') ? decodeURIComponent(urlParams.get('vars')) : '';

        // Format raw names passed with underscores back to clean text
        const itemName = rawName.replace(/_/g, ' ');

        // Inject elements into visible HTML tags
        document.getElementById('display-name').textContent = itemName;
        document.getElementById('display-price').textContent = `$${rawPrice.toFixed(2)}`;

        // 2. Parse variant values into proper Dropdowns vs Layout text blocks
        const variantContainer = document.getElementById('dynamic-variants-container');

        if (rawVars && rawVars.trim() !== "") {
            // Split options by custom breaking symbols like pipes, semicolons or standard lines
            const categories = rawVars.split(/[|;\n]/); 
            
            categories.forEach(cat => {
                cat = cat.trim();
                if (!cat) return;

                const groupDiv = document.createElement('div');
                groupDiv.className = 'input-group';

                // Condition A: If it has structured format 'Category: Opt1, Opt2' -> Generate Dropdown Select Menu
                if (cat.includes(':')) {
                    const parts = cat.split(':');
                    const labelText = parts[0].trim();
                    const optionsText = parts[1].trim();
                    const optionsArray = optionsText.split(',').map(o => o.trim());

                    const label = document.createElement('label');
                    label.textContent = labelText + ":";
                    
                    const select = document.createElement('select');
                    select.className = 'variant-selector';
                    select.dataset.variantName = labelText;

                    optionsArray.forEach(opt => {
                        const optionElement = document.createElement('option');
                        optionElement.value = opt;
                        optionElement.textContent = opt;
                        select.appendChild(optionElement);
                    });

                    groupDiv.appendChild(label);
                    groupDiv.appendChild(select);
                } 
                // Condition B: Fallback system. If formatting is plain text, render it safely so it doesn't break
                else {
                    const staticText = document.createElement('p');
                    staticText.className = 'static-variant-text';
                    staticText.textContent = cat;
                    
                    // Invisible tracking field to carry layout configuration values over to final local storage checkout array
                    const hiddenInput = document.createElement('input');
                    hiddenInput.type = 'hidden';
                    hiddenInput.className = 'variant-selector-static';
                    hiddenInput.value = cat;

                    groupDiv.appendChild(staticText);
                    groupDiv.appendChild(hiddenInput);
                }
                
                variantContainer.appendChild(groupDiv);
            });
        }

        // 3. Logic to package variants and user designs together on checkout fire event
        document.getElementById('add-to-cart-btn').onclick = () => {
            const chosenDesign = document.getElementById('design-code').value.trim();
            
            // Halt checkout and require design validation input
            if (!chosenDesign) {
                alert("Please look at the template and type your chosen design style code first!");
                return;
            }

            let selectedVariants = [];
            
            // Loop through and extract selections from active select inputs
            const dropdowns = document.querySelectorAll('.variant-selector');
            dropdowns.forEach(dropdown => {
                selectedVariants.push(`${dropdown.dataset.variantName}: ${dropdown.value}`);
            });

            // Loop through and extract from plain-text fallbacks
            const statics = document.querySelectorAll('.variant-selector-static');
            statics.forEach(staticInp => {
                selectedVariants.push(staticInp.value);
            });

            // Format dynamic selections and custom user Canva code choices together smoothly
            let finalDetails = selectedVariants.filter(Boolean).join(', ');
            if (finalDetails) {
                finalDetails += ` | Design: ${chosenDesign}`;
            } else {
                finalDetails = `Design Style: ${chosenDesign}`;
            }

            // Retrieve active cart array or establish clean line instance 
            let finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
            
            // Final storage insertion item package
            finalCart.push({ 
                name: itemName, 
                price: rawPrice, 
                details: finalDetails, 
                qty: 1 
            });

            // Commit modifications to cache storage matrix and relocate user view context forward
            localStorage.setItem('final_shopping_cart', JSON.stringify(finalCart));
            window.location.href = '/cart'; 
        };
    </script>
</body>
</html>
