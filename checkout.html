<!DOCTYPE html>
<html>
<head>
    <style>
    body { 
        font-family: sans-serif; 
        padding: 20px; 
        display: flex; 
        flex-direction: column; 
        align-items: center; /* Centers everything horizontally */
    }

    #master-list {
        width: 100%;
        max-width: 600px; /* Keeps the list from getting too wide on desktop */
    }

    .cart-item { 
        border-bottom: 2px solid #e75480; 
        padding: 15px 0; 
        width: 100%;
    }

    .total-box { 
        font-size: 1.5em; 
        margin: 20px 0; 
        text-align: center; /* Centers the total text */
        width: 100%;
    }

    /* This targets the PayPal container specifically */
    #paypal-button-container { 
        width: 100%; 
        max-width: 350px; /* Standard professional width for PayPal buttons */
        margin: 0 auto; 
    }
</style>

</head>
<body>
    <h2>Final Checkout</h2>
    <div id="master-list"></div>
    <div class="total-box">Grand Total: $<span id="grand-total">0.00</span></div>
    
    <div id="paypal-button-container"></div>

    <script src="https://www.paypal.com/sdk/js?client-id=AWHpVW_dn2CYWVWbV5HGD2v3NpGs5atS90DuDMGrNZzFT--Anx1Ec80q7bwOAQ2lqfc4Gpd0NbBkYWRd"></script>
    <script>
        function renderMasterCart() {
            const finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
            const container = document.getElementById('master-list');
            let grandTotal = 0;

            container.innerHTML = finalCart.map((item, index) => {
                grandTotal += item.price;
                return `
                    <div class="cart-item">
                        <div class="item-name">${item.name} - $${item.price.toFixed(2)}</div>
                        <div class="item-details">${item.details || ''}</div>
                        <button onclick="removeItem(${index})" style="color:red; border:none; background:none; cursor:pointer; font-size:12px;">Remove</button>
                    </div>`;
            }).join('');

            document.getElementById('grand-total').textContent = grandTotal.toFixed(2);
            return grandTotal.toFixed(2);
        }

        function removeItem(index) {
            let finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
            finalCart.splice(index, 1);
            localStorage.setItem('final_shopping_cart', JSON.stringify(finalCart));
            renderMasterCart();
        }

        paypal.Buttons({
            createOrder: (data, actions) => {
                return actions.order.create({
                    purchase_units: [{
                        amount: { value: renderMasterCart() },
                        description: "Full Order Purchase"
                    }]
                });
            },
            onApprove: (data, actions) => {
                return actions.order.capture().then(details => {
                    localStorage.removeItem('final_shopping_cart');
                    alert('Order complete! Thank you ' + details.payer.name.given_name);
                    location.reload();
                });
            }
        }).render('#paypal-button-container');

        renderMasterCart();
    </script>
</body>
</html>
