<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #master-list { width: 100%; max-width: 600px; }
        .cart-item { border-bottom: 2px solid #e75480; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .item-info { flex-grow: 1; }
        .qty-controls { display: flex; align-items: center; gap: 10px; margin-left: 20px; }
        .qty-btn { background: #eee; border: 1px solid #ccc; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        .remove-link { color: #ff4d4d; font-size: 11px; cursor: pointer; display: block; margin-top: 5px; }
        .total-box { font-size: 1.5em; margin: 20px 0; text-align: center; width: 100%; font-weight: bold; }
        #paypal-button-container { width: 100%; max-width: 350px; }
    </style>
</head>
<body>
    <h2>Your Cart</h2>
    <div id="master-list"></div>
    <div class="total-box">Grand Total: $<span id="grand-total">0.00</span></div>
    <div id="paypal-button-container"></div>

    <script src="https://www.paypal.com/sdk/js?client-id=AWHpVW_dn2CYWVWbV5HGD2v3NpGs5atS90DuDMGrNZzFT--Anx1Ec80q7bwOAQ2lqfc4Gpd0NbBkYWRd"></script>
    <script>
        function updateQty(index, change) {
            let finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
            finalCart[index].qty = (finalCart[index].qty || 1) + change;
            if (finalCart[index].qty < 1) return removeItem(index);
            localStorage.setItem('final_shopping_cart', JSON.stringify(finalCart));
            renderMasterCart();
        }

        function removeItem(index) {
            let finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
            finalCart.splice(index, 1);
            localStorage.setItem('final_shopping_cart', JSON.stringify(finalCart));
            renderMasterCart();
        }

        function renderMasterCart() {
            const finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
            const container = document.getElementById('master-list');
            let grandTotal = 0;

            container.innerHTML = finalCart.map((item, index) => {
                const itemQty = item.qty || 1;
                const lineTotal = item.price * itemQty;
                grandTotal += lineTotal;
                return `
                    <div class="cart-item">
                        <div class="item-info">
                            <div style="font-weight:bold">${item.name}</div>
                            <div style="font-size:12px; color:#666">${item.details || ''}</div>
                            <span class="remove-link" onclick="removeItem(${index})">Remove Item</span>
                        </div>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                            <span>${itemQty}</span>
                            <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                            <div style="min-width:70px; text-align:right">$${lineTotal.toFixed(2)}</div>
                        </div>
                    </div>`;
            }).join('');

            document.getElementById('grand-total').textContent = grandTotal.toFixed(2);
            return grandTotal.toFixed(2);
        }

        paypal.Buttons({
            createOrder: (data, actions) => {
                return actions.order.create({
                    purchase_units: [{ amount: { value: renderMasterCart() } }]
                });
            }
        }).render('#paypal-button-container');

        renderMasterCart();
    </script>
</body>
</html>
