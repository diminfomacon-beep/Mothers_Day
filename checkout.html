<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script type="text/javascript">
   (function(){ emailjs.init("1LZbCPvH49G_r0ypB"); })();
</script>
    <style>
        body { font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; background: #fffafb; }
        #master-list { width: 100%; max-width: 600px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .cart-item { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .options-section { width: 100%; max-width: 600px; margin-top: 20px; padding: 15px; background: #fdf2f5; border-radius: 15px; }
        .total-box { font-size: 1.2em; margin: 20px 0; text-align: right; width: 100%; max-width: 600px; line-height: 1.6; }
        .grand-total-row { font-size: 1.5em; font-weight: bold; color: #e75480; border-top: 2px solid #e75480; padding-top: 10px; margin-top: 10px; }
        #paypal-button-container { width: 100%; max-width: 350px; margin-top: 20px; }
        .input-style { padding: 8px; border-radius: 8px; border: 1px solid #ccc; margin-top: 5px; }
    </style>
</head>
<body>
    <h2>Complete Your Order</h2>
    <div id="master-list"></div>

    <div class="options-section">
        <h3>Choose Delivery Method</h3>
        <input type="radio" name="delivery" value="pickup" checked onclick="renderMasterCart()"> Local Pickup (Free)<br>
        <input type="radio" name="delivery" value="shipping" onclick="renderMasterCart()"> Shipping<br>
        
        <div id="shipping-options" style="display:none; margin-top:10px; padding-left: 20px;">
            <label>Destination:</label>
           <select id="ship-region" onchange="renderMasterCart()" class="input-style">
                <option value="US">United States ($9.50)</option>
                <option value="CA">Canada (Calculated at Checkout)</option> <option value="INTL">International (Calculated at Checkout)</option>
            </select>
        </div>

        <h3>Enter Discount Code</h3>
        <input type="text" id="promo-input" placeholder="Enter code" class="input-style">
        <button onclick="renderMasterCart()" style="padding: 8px; cursor: pointer;">Apply</button>
        <div id="promo-msg" style="font-size: 12px; color: #28a745; margin-top: 5px;"></div>
    </div>

    <div class="total-box">
        <div>Subtotal: $<span id="sub-total">0.00</span></div>
        <div id="discount-row" style="color: #e75480; display:none;">Discount: -$<span id="discount-amt">0.00</span></div>
        <div>Shipping: $<span id="shipping-amt">0.00</span></div>
        <div>Tax (4%): $<span id="tax-amt">0.00</span></div>
        <div class="grand-total-row">Grand Total: $<span id="grand-total">0.00</span></div>
    </div>

    <div id="paypal-button-container"></div>

    <script src="https://www.paypal.com/sdk/js?client-id=AWHpVW_dn2CYWVWbV5HGD2v3NpGs5atS90DuDMGrNZzFT--Anx1Ec80q7bwOAQ2lqfc4Gpd0NbBkYWRd"></script>
    <script>
       function updateQty(index, change) {
            let finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
            finalCart[index].qty = (finalCart[index].qty || 1) + change;
            if (finalCart[index].qty <= 0) finalCart.splice(index, 1);
            localStorage.setItem('final_shopping_cart', JSON.stringify(finalCart));
            renderMasterCart();
        }

        function removeItem(index) {
            let finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
            finalCart.splice(index, 1);
            localStorage.setItem('final_shopping_cart', JSON.stringify(finalCart));
            renderMasterCart();
        }

        // ... (updateQty and removeItem functions remain the same) ...

        function renderMasterCart() {
            const finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
            const container = document.getElementById('master-list');
            const promoInput = document.getElementById('promo-input').value.trim().toUpperCase();
            const promoMsg = document.getElementById('promo-msg');
            
            let baseTotal = 0;
            const totalQty = finalCart.reduce((sum, item) => sum + (item.qty || 1), 0);

            if (finalCart.length === 0) {
                container.innerHTML = "<p style='text-align:center;'>Your cart is empty.</p>";
            } else {
                container.innerHTML = finalCart.map((item, index) => {
                    const qty = item.qty || 1;
                    const lineTotal = item.price * qty;
                    baseTotal += lineTotal;
                    return `
                        <div class="cart-item">
                            <div>
                                <b>${item.name}</b><br>
                                <small style="color:#666;">${item.details || ''}</small><br>
                                <button onclick="removeItem(${index})" style="color:red; border:none; background:none; cursor:pointer;">[ REMOVE ]</button>
                            </div>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <button onclick="updateQty(${index}, -1)">-</button>
                                <span>${qty}</span>
                                <button onclick="updateQty(${index}, 1)">+</button>
                            </div>
                            <div><b>$${lineTotal.toFixed(2)}</b></div>
                        </div>`;
                }).join('');
            }

            // --- Promo Logic ---
            let promoDiscount = 0;
            const validPromos = { 
                "MOTHERSDAY": { type: "percent", value: 0.10 },
                "VIP20": { type: "percent", value: 0.20 },
                "SAVE10": { type: "flat", value: 10.00 }
            };

            if (promoInput !== "") {
                if (validPromos[promoInput]) {
                    const promo = validPromos[promoInput];
                    promoDiscount = promo.type === "percent" ? baseTotal * promo.value : promo.value;
                    if (promoDiscount > baseTotal) promoDiscount = baseTotal;
                    promoMsg.style.color = "#28a745";
                    promoMsg.textContent = "Code applied!";
                    document.getElementById('discount-row').style.display = "block";
                } else {
                    promoMsg.style.color = "#dc3545";
                    promoMsg.textContent = "Invalid or expired code.";
                    document.getElementById('discount-row').style.display = "none";
                }
            } else {
                promoMsg.textContent = "";
                document.getElementById('discount-row').style.display = "none";
            }

            // --- Shipping Logic ---
            const deliveryType = document.querySelector('input[name="delivery"]:checked').value;
            const selectedRegion = document.getElementById('ship-region').value;
            let shippingCost = 0;

            if (deliveryType === 'shipping') {
                document.getElementById('shipping-options').style.display = 'block';
                if (selectedRegion === "US") {
                    shippingCost = 9.50;
                } else if (selectedRegion === "CA") {
                    if (totalQty >= 8) shippingCost = 75.00;
                    else if (totalQty >= 4) shippingCost = 40.00;
                    else shippingCost = 25.00;
                } else {
                    if (totalQty >= 8) shippingCost = 135.00;
                    else if (totalQty >= 4) shippingCost = 95.00;
                    else shippingCost = 65.00;
                }
            } else {
                document.getElementById('shipping-options').style.display = 'none';
            }

            const subtotalAfterDiscount = baseTotal - promoDiscount;
            const tax = subtotalAfterDiscount * 0.04;
            const grandTotal = subtotalAfterDiscount + shippingCost + tax;

            document.getElementById('sub-total').textContent = baseTotal.toFixed(2);
            document.getElementById('discount-amt').textContent = promoDiscount.toFixed(2);
            document.getElementById('shipping-amt').textContent = shippingCost.toFixed(2);
            document.getElementById('tax-amt').textContent = tax.toFixed(2);
            document.getElementById('grand-total').textContent = grandTotal.toFixed(2);

            return grandTotal.toFixed(2);
        }

        // --- NEW: Alert Function ---
        function sendPushNotification(total) {
            fetch("https://api.pushover.net/1/messages.json", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({
                    token: "au8jzsjjx9wz4dxvgc95h9nj86mzgz", // PASTE YOUR TOKEN HERE
                    user: "ueb3ouifx46g56n7by3rfh198nmagb",   // PASTE YOUR USER KEY HERE
                    title: "New Sale! 💰",
                    message: "You just received an order for $" + total,
                    priority: 1
                })
            });
        }

        function sendOrderEmail() {
            const finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
            let orderSummary = finalCart.map(item => `Item: ${item.name} x${item.qty || 1}\nDetails: ${item.details}\n\n`).join('');
            const templateParams = {
                order_details: orderSummary,
                grand_total: document.getElementById('grand-total').textContent,
                discount: document.getElementById('discount-amt').textContent,
                shipping: document.getElementById('shipping-amt').textContent
            };
            emailjs.send('service_ezq1fuc', 'template_ut1r5xk', templateParams);
        }

        paypal.Buttons({
            createOrder: (data, actions) => {
                const subtotal = document.getElementById('sub-total').textContent;
                const discount = document.getElementById('discount-amt').textContent;
                const shipping = document.getElementById('shipping-amt').textContent;
                const tax = document.getElementById('tax-amt').textContent;
                const grandTotal = document.getElementById('grand-total').textContent;
                const itemTotalAdjusted = (parseFloat(subtotal) - parseFloat(discount)).toFixed(2);

                return actions.order.create({
                    purchase_units: [{
                        amount: {
                            currency_code: "USD",
                            value: grandTotal,
                            breakdown: {
                                item_total: { currency_code: "USD", value: itemTotalAdjusted },
                                shipping: { currency_code: "USD", value: shipping },
                                tax_total: { currency_code: "USD", value: tax }
                            }
                        }
                        items: finalCart.map(item => ({
                            name: item.name,
                            description: item.details || "No details provided",
                            unit_amount: {
                                currency_code: "USD",
                                value: item.price.toFixed(2)
                            },
                            quantity: item.qty || 1
                        }))
                    }]
                });
            },
           onApprove: (data, actions) => {
            return actions.order.capture().then(async (details) => { // Added async
                const total = document.getElementById('grand-total').textContent;
                
                // Use await to ensure these finish before the page changes
                try {
                    await sendPushNotification(total); 
                    await sendOrderEmail();
                } catch (err) {
                    console.error("Notification failed", err);
                }
        
                localStorage.removeItem('final_shopping_cart');
                window.location.href = "thank-you.html";
            });
        }
        }).render('#paypal-button-container');

        renderMasterCart();
    </script>
</body>
</html>
