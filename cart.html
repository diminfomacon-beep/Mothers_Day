<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Open Sans', sans-serif; color: #333; padding: 10px; }
        .cart-container { border: 1px solid #eee; padding: 15px; border-radius: 8px; background: #fff; }
        h3 { color: #e75480; margin-top: 0; }
        
        .item-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 8px 0; 
            border-bottom: 1px outline #f9f9f9;
        }

        .remove-btn { 
            background: none; 
            border: none; 
            color: #ff4d4d; 
            cursor: pointer; 
            font-size: 12px; 
            text-decoration: underline;
        }

        .total-row { 
            margin-top: 15px; 
            font-weight: bold; 
            font-size: 1.2em; 
            border-top: 2px solid #e75480; 
            padding-top: 10px; 
        }

        #paypal-button-container { margin-top: 20px; }
    </style>
</head>
<body>

<div class="cart-container">
    <h3>Your Bundle</h3>
    <div id="item-list"></div>
    <div class="total-row">Total: $<span id="total-price">0.00</span></div>
    <div id="paypal-button-container"></div>
</div>

<script src="https://www.paypal.com/sdk/js?client-id=AWHpVW_dn2CYWVWbV5HGD2v3NpGs5atS90DuDMGrNZzFT--Anx1Ec80q7bwOAQ2lqfc4Gpd0NbBkYWRd"></script>
<script>
    function renderCart() {
        const listContainer = document.getElementById('item-list');
        const totalDisp = document.getElementById('total-price');
        const bundle = JSON.parse(localStorage.getItem('my_bundle')) || [];
        
        listContainer.innerHTML = ''; // Clear current list
        let total = 0;

        if (bundle.length === 0) {
            listContainer.innerHTML = '<p style="color:#999 italic">Your bundle is empty.</p>';
        }

        bundle.forEach((item, index) => {
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `
                <span>${item.name.replace(/_/g, ' ')} - $${item.price.toFixed(2)}</span>
                <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
            `;
            listContainer.appendChild(row);
            total += item.price;
        });

        totalDisp.textContent = total.toFixed(2);
        return total.toFixed(2);
    }

    function removeItem(index) {
        let bundle = JSON.parse(localStorage.getItem('my_bundle')) || [];
        bundle.splice(index, 1); // Remove the specific item by its position
        localStorage.setItem('my_bundle', JSON.stringify(bundle));
        renderCart(); // Refresh the list
    }

    // Refresh cart when the user adds something (every 1 second)
    setInterval(renderCart, 1000);

    // Initial render
    renderCart();

        paypal.Buttons({
            createOrder: (data, actions) => {
                const bundle = JSON.parse(localStorage.getItem('my_bundle')) || [];
                const total = bundle.reduce((sum, item) => sum + item.price, 0).toFixed(2);
                
                // Create a summary string: "Red_Roses, Mothers_Day_Card"
                const itemSummary = bundle.map(item => item.name).join(", ");
        
                if (total <= 0) {
                    alert("Your bundle is empty!");
                    return;
                }
        
                return actions.order.create({
                    purchase_units: [{
                        description: "Mothers Day Bundle: " + itemSummary, // THIS SHOWS IN YOUR PAYPAL
                        amount: {
                            currency_code: "USD",
                            value: total
                        }
                    }]
                });
            },
            onApprove: (data, actions) => {
                return actions.order.capture().then(details => {
                    localStorage.removeItem('my_bundle');
                    // Show a success message with the customer's name
                    alert('Order placed! Thank you, ' + details.payer.name.given_name);
                    renderCart();
                });
            }
        }).render('#paypal-button-container');
</script>

</body>
</html>
