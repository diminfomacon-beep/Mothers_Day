<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #fff; }
        .item-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .discount-text { color: #e75480; font-weight: bold; margin: 10px 0; }
        #add-to-final { 
            background: #e75480; color: white; border: none; padding: 12px; 
            width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px;
        }
    </style>
</head>
<body>
    <div id="bundle-list"></div>
    <div id="summary"></div>
    <button id="add-to-final">Add Bundle to Cart</button>

    <script>
        function updateBundle() {
            const bundle = JSON.parse(localStorage.getItem('my_bundle')) || [];
            const list = document.getElementById('bundle-list');
            const summary = document.getElementById('summary');
            let subtotal = 0;

            list.innerHTML = bundle.map((item, i) => {
                subtotal += item.price;
                return `<div class="item-row"><span>${item.name.replace(/_/g, ' ')}</span><span>$${item.price.toFixed(2)}</span></div>`;
            }).join('');

            // Discount Logic
            let discount = 0;
            if (bundle.length >= 11) discount = 0.15;
            else if (bundle.length >= 6) discount = 0.10;

            let finalPrice = subtotal * (1 - discount);
            summary.innerHTML = `
                <div class="discount-text">${discount > 0 ? (discount*100)+'% Discount Applied!' : ''}</div>
                <div style="font-weight:bold">Bundle Total: $${finalPrice.toFixed(2)}</div>
            `;

            document.getElementById('add-to-final').onclick = function() {
                if (bundle.length === 0) return alert("Bundle is empty!");

                const finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
                
                // Package the bundle as ONE item
                const bundlePackage = {
                    name: "Custom Mother's Day Bundle",
                    details: bundle.map(i => i.name.replace(/_/g, ' ')).join(", "),
                    price: finalPrice
                };

                finalCart.push(bundlePackage);
                localStorage.setItem('final_shopping_cart', JSON.stringify(finalCart));
                localStorage.removeItem('my_bundle'); // Clear the builder for a new one
                
                alert("Bundle added to Final Cart!");
                // Optional: window.top.location.href = "https://sites.google.com/d/1Ilg8NV30IkHe6SBAk0Lwp0_u0DQN6dto/p/1wLdAmqRV_RnQ32ijwo33rnTGyTatVvHp/edit";
            };
        }
        setInterval(updateBundle, 1000);
        updateBundle();
    </script>
</body>
</html>
