<!DOCTYPE html>
<html>
<body>
  <div id="display"><h4>Bundle: $0.00</h4></div>
  <div id="paypal-button-container"></div>

  <script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID"></script>
  <script>
    function updateCart() {
      const cart = JSON.parse(localStorage.getItem('my_bundle')) || [];
      const total = cart.reduce((sum, item) => sum + item.price, 0);
      document.getElementById('display').innerHTML = `<h4>Bundle Total: $${total.toFixed(2)}</h4>`;
      return total.toFixed(2);
    }

    // Update the total display every second
    setInterval(updateCart, 1000);

    paypal.Buttons({
      createOrder: (data, actions) => {
        return actions.order.create({
          purchase_units: [{ amount: { value: updateCart() } }]
        });
      },
      onApprove: (data, actions) => {
        return actions.order.capture().then(() => {
          localStorage.removeItem('my_bundle'); // Clear cart after success
          alert('Payment Successful!');
        });
      }
    }).render('#paypal-button-container');
  </script>
</body>
</html>
