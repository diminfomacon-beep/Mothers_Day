<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #FFF0F5; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .remove-btn { color: #ff4d4d; border: none; background: none; cursor: pointer; font-size: 11px; text-decoration: underline; }
        .price-details { text-align: right; margin-top: 15px; }
        .original-price {text-decoration: line-through;color: #bbb; /* Lighter grey */font-size: 0.8em; /* Smaller */margin-right: 5px;}
        .discount-text {color: #999; /* Subtle grey instead of bright pink */font-size: 0.85em; font-style: italic; /* Softer look */margin: 5px 0;}
        #add-to-final {background: #e75480; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px;}
        #clear-cart {background:#999; color:white; border:none; padding:10px;width:100%; border-radius:5px; cursor:pointer; margin-top:8px;}
        #status-msg {margin-top:10px;font-size:13px;color:green;}
    </style>
</head>
<body>

    <div id="bundle-list"></div>
    <div class="price-details" id="summary"></div>

    <button id="add-to-final">Add Bundle to Cart</button>
    <button id="clear-cart">Clear Bundle</button>

    <div id="status-msg"></div>

   <script>
    function getBundle() {
        return JSON.parse(localStorage.getItem('my_bundle')) || [];
    }

    function saveBundle(bundle) {
        localStorage.setItem('my_bundle', JSON.stringify(bundle));
    }

    function removeItem(index) {
        let bundle = getBundle();
        bundle.splice(index, 1);
        saveBundle(bundle);
        updateBundle();
    }

    function clearBundle() {
        localStorage.removeItem('my_bundle');
        updateBundle();
        showMessage("Bundle cleared.");
    }

    function showMessage(msg) {
        const el = document.getElementById('status-msg');
        el.textContent = msg;
        setTimeout(() => el.textContent = "", 3000);
    }

    function updateBundle() {
        const bundle = getBundle();
        const list = document.getElementById('bundle-list');
        const summary = document.getElementById('summary');

        let subtotal = 0;

        // Render items
        list.innerHTML = bundle.map((item, i) => {
            subtotal += item.price;
            return `<div class="item-row">
                <span>${item.name.replace(/_/g, ' ')} ($${item.price.toFixed(2)})</span>
                <button class="remove-btn" onclick="removeItem(${i})">Remove</button>
            </div>`;
        }).join('');

        // Discount logic
        const qualifyingItems = bundle.filter(item => item.price > 0).length;
        let discount = 0;
        if (qualifyingItems >= 11) discount = 0.15;
        else if (qualifyingItems >= 6) discount = 0.10;

        const finalPrice = subtotal * (1 - discount);

        summary.innerHTML = `
            <div style="font-size: 0.9em; margin-bottom: 5px;">Subtotal: $${subtotal.toFixed(2)}</div>
            ${discount > 0 ? `<div class="discount-text">Bundle discount applied: -${discount*100}%</div>` : ''}
            <div style="font-size: 1.3em; font-weight: bold; margin-top: 10px;">
                Total: ${discount > 0 ? `<span class="original-price">$${subtotal.toFixed(2)}</span>` : ''}
                $${finalPrice.toFixed(2)}
            </div>
        `;

        document.getElementById('clear-cart').disabled = bundle.length === 0;
    }

    // --- ADD TO CART LOGIC (Moved outside of updateBundle) ---
    document.getElementById('add-to-final').onclick = function() {
        const bundle = getBundle();
        if (bundle.length === 0) {
            showMessage("Bundle is empty.");
            return;
        }

        const finalPrice = parseFloat(document.getElementById('summary').innerText.match(/\$([\d.]+)/g).pop().replace('$', ''));
        const finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
        const detailedSummary = bundle.map(i => i.message ? `${i.name} [Msg: ${i.message}]` : i.name).join(", ");

        finalCart.push({
            name: "Custom Mother's Day Bundle",
            details: detailedSummary,
            price: finalPrice,
            qty: 1
        });

        localStorage.setItem('final_shopping_cart', JSON.stringify(finalCart));
        localStorage.removeItem('my_bundle');
        updateBundle();
        showMessage("Bundle added to cart!");
    };

    document.getElementById('clear-cart').onclick = clearBundle;
// This listens for any changes to localStorage anywhere on your site
    window.addEventListener('storage', function(event) {
        if (event.key === 'my_bundle') {
            updateBundle();
        }
    });
    // Listen for the signal from the product buttons
  

    updateBundle();
</script>

</body>
</html>
