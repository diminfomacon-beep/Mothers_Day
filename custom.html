<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #b6d9e4; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
        .remove-btn { color: #ff4d4d; border: none; background: none; cursor: pointer; text-decoration: underline; }
        #add-to-final { background: #105e53; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="bundle-list"></div>
    <div id="summary" style="margin-top:15px; text-align:right;"></div>
    <button id="add-to-final">Add Custom Bundle to Cart</button>

    <script>
        const KEY = 'custom_bundle_key';
        function update() {
            const bundle = JSON.parse(localStorage.getItem(KEY)) || [];
            const list = document.getElementById('bundle-list');
            let subtotal = 0;
            list.innerHTML = bundle.map((item, i) => {
                subtotal += item.price;
                return `<div class="item-row">
                    <span>${item.name} ${item.details ? '('+item.details+')' : ''} - $${item.price.toFixed(2)}</span>
                    <button class="remove-btn" onclick="remove(${i})">Remove</button>
                </div>`;
            }).join('');
            document.getElementById('summary').innerHTML = `<strong>Total: $${subtotal.toFixed(2)}</strong>`;
        }
        function remove(i) {
            let bundle = JSON.parse(localStorage.getItem(KEY)) || [];
            bundle.splice(i, 1);
            localStorage.setItem(KEY, JSON.stringify(bundle));
            update();
        }
        document.getElementById('add-to-final').onclick = () => {
            const bundle = JSON.parse(localStorage.getItem(KEY)) || [];
            if (bundle.length === 0) return;
            let cart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
            cart.push({ name: "Custom Bundle Selection", price: bundle.reduce((a,b)=>a+b.price, 0), qty: 1 });
            localStorage.setItem('final_shopping_cart', JSON.stringify(cart));
            localStorage.removeItem(KEY);
            window.location.href = '/cart';
        };
        window.addEventListener('storage', (e) => { if(e.key === KEY) update(); });
        update();
    </script>
</body>
</html>
