<!DOCTYPE html>
<html>
<head>
 <style>
        body { font-family: sans-serif; padding: 10px; background: #c5c5dd; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eeeeee; font-size: 14px; }
        .remove-btn { color: #ff4d4d; border: none; background: none; cursor: pointer; font-size: 11px; text-decoration: underline; }
        .price-details { text-align: right; margin-top: 15px; }
        .original-price {text-decoration: line-through;color: #bbb; /* Lighter grey */font-size: 0.8em; /* Smaller */margin-right: 5px;}
        .discount-text {color: #999; /* Subtle grey instead of bright pink */font-size: 0.85em; font-style: italic; /* Softer look */margin: 5px 0;}
        #add-to-final {background: #395763 ; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px;}
        #clear-cart {background:#999; color:white; border:none; padding:10px;width:100%; border-radius:5px; cursor:pointer; margin-top:8px;}
        #status-msg {margin-top:10px;font-size:13px;color:green;}
    </style>
</head>
<body>
    <style>
    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.02); }
        100% { transform: scale(1); }
    }
    .photo-notice {
        background: #fff3f5;
        border: 1px solid #395763;
        padding: 12px;
        border-radius: 8px;
        font-size: 12px;
        margin-bottom: 15px;
        color: #333;
        text-align: center;
        animation: pulse 2s infinite ease-in-out;
    }
</style>

<div class="photo-notice">
    <strong>🖼️Multiple Photo Submissions:</strong> Please email your images to <strong>info@dimbrightideas.com</strong> from your order email.</div>
    <div id="bundle-list"></div>
    <div class="price-details" id="summary"></div>

    <button id="add-to-final">Add Bundle to Cart</button>
    <button id="clear-cart">Clear Bundle</button>

    <div id="status-msg"></div>

   <script>
    let currentFinalPrice = 0; // <--- ADD THIS AT THE TOP
    function getBundle() {
        return JSON.parse(localStorage.getItem('my_custom_bundle')) || [];
    }

function saveBundle(bundle) {
    // Changed from 'my_bundle' to 'my_custom_bundle'
    localStorage.setItem('my_custom_bundle', JSON.stringify(bundle));
}

function clearBundle() {
    // Changed from 'my_bundle' to 'my_custom_bundle'
    localStorage.removeItem('my_custom_bundle');
    updateBundle();
    showMessage("Bundle cleared.");
}

// Update the storage event listener at the bottom:
window.addEventListener('storage', function(event) {
    if (event.key === 'my_custom_bundle') { // Listen for the new key
        updateBundle();
    }
});
    function removeItem(index) {
        let bundle = getBundle();
        bundle.splice(index, 1);
        saveBundle(bundle);
        updateBundle();
    }


    function showMessage(msg) {
        const el = document.getElementById('status-msg');
        el.textContent = msg;
        setTimeout(() => el.textContent = "", 3000);
    }

    function updateBundle() {
        const bundle = getBundle();
        const list = document.getElementById('bundle-list');
        const summary = document.getElementById('summary');

        let subtotal = 0;

        // Render items
        // Inside your bundle container's updateBundle() function:
        list.innerHTML = bundle.map((item, i) => {
            subtotal += item.price;
            // This displays the name, the variety (from the message), and the price
            return `<div class="item-row">
                <span>${item.name} ${item.message ? `<br><small style="color:#666">${item.message}</small>` : ''}</span>
                <span>$${item.price.toFixed(2)}</span>
                <button class="remove-btn" onclick="removeItem(${i})">Remove</button>
            </div>`;
        }).join('');
        // Discount logic
        const qualifyingItems = bundle.filter(item => item.price > 0).length;
        let discount = 0;
        if (qualifyingItems >= 11) discount = 0.15;
        else if (qualifyingItems >= 6) discount = 0.10;
        
        const finalPrice = subtotal * (1 - discount);
        currentFinalPrice = finalPrice; // <--- ADD THIS LINE HERE
        
        summary.innerHTML = `
            <div style="font-size: 0.9em; margin-bottom: 5px;">
                Subtotal: $${subtotal.toFixed(2)}
            </div>
            
            ${discount > 0 ? `
                <div class="discount-text" style="color: #e75480; font-weight: bold;">
                    Bundle Discount Applied: ${discount * 100}% OFF
                </div>
                <div style="font-size: 1.1em; color: #666; margin-top: 5px;">
                    Original Price: <span style="text-decoration: line-through;">$${subtotal.toFixed(2)}</span>
                </div>
            ` : ''}
            
            <div style="font-size: 1.5em; font-weight: bold; margin-top: 10px; color: #333;">
                Total: $${finalPrice.toFixed(2)}
            </div>
        `;

        document.getElementById('clear-cart').disabled = bundle.length === 0;
    }

    // --- ADD TO CART LOGIC (Moved outside of updateBundle) ---
   // --- ADD TO CART LOGIC ---
   document.getElementById('add-to-final').onclick = function() {
    const bundle = getBundle();
    if (bundle.length === 0) {
        showMessage("Bundle is empty.");
        return;
    }

    // REPLACED THE FRAGILE MATCH LINE WITH THIS:
    const finalPrice = currentFinalPrice; 

    const finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
    // ... (rest of your add to cart logic)
    const detailedSummary = bundle.map(i => i.message ? `${i.name} [Msg: ${i.message}]` : i.name).join(", ");

        finalCart.push({
            name: "Custom Bundle", 
            details: detailedSummary,
            price: finalPrice,
            qty: 1
        });

        localStorage.setItem('final_shopping_cart', JSON.stringify(finalCart));
        
        // FIX: Remove the new key, not the old one
        localStorage.removeItem('my_custom_bundle'); 
        
        updateBundle();
        showMessage("Bundle added to cart!");
    };
     // Add this to the bottom of your <script>
    // This forces a refresh even if the 'storage' event doesn't fire locally
    setInterval(() => {
        updateBundle();
    }, 1000); 
    
    // Ensure your clear button works with the new key
    document.getElementById('clear-cart').onclick = clearBundle;


  

    updateBundle();
</script>

</body>
</html>
