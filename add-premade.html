<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #add-btn {
            background-color: #e75480; color: white; border: none;
            padding: 10px 24px; border-radius: 20px;
            font-weight: bold; cursor: pointer; font-family: sans-serif;
            transition: 0.3s; width: 100%;
        }
        #add-btn:hover { background: #c93d66; }
    </style>
</head>
<body>
    <button id="add-btn">Add to Cart</button>

    <script>
        const params = new URLSearchParams(window.location.search);
        const itemName = params.get('name') || "Premade Bundle";
        const itemPrice = parseFloat(params.get('price')) || 0.00;

        document.getElementById('add-btn').onclick = function() {
            // Access the FINAL shopping cart (shared with checkout.html)
            let finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
            
            // Add the premade item
            finalCart.push({ 
                name: itemName.replace(/_/g, ' '), 
                price: itemPrice,
                details: "Premade Selection" 
            });
            
            localStorage.setItem('final_shopping_cart', JSON.stringify(finalCart));
            
            // Success feedback
            this.textContent = "Added!";
            this.style.background = "#28a745";
            
            setTimeout(() => {
                this.textContent = "Add to Cart";
                this.style.background = "#e75480";
            }, 1000);
        };
    </script>
</body>
</html>
