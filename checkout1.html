<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Order</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        window.onload = function() {
            if (window.emailjs) {
                emailjs.init({ publicKey: "1LZbCPvH49G_r0ypB" });
                console.log("EmailJS loaded successfully.");
            } else {
                console.error("EmailJS failed to load due to browser blocking.");
            }
        };
    </script>
       
    <style>
        body { font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; background: #c5c5dd; }
        #master-list { width: 100%; max-width: 600px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .cart-item { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        
        /* Unique Alternating Color-Coding Cards for Bundles */
        .packaged-bundle-card {
            padding: 15px;
            border-radius: 12px;
            margin: 12px 0;
            box-shadow: inset 4px 0 0px 0px #e75480;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .bundle-color-1 { background-color: #fff3f6; } /* Soft Rose */
        .bundle-color-2 { background-color: #f0f7f4; } /* Soft Mint */
        .bundle-color-3 { background-color: #f4f7fa; } /* Soft Slate Blue */
        .bundle-color-4 { background-color: #fbf7f0; } /* Soft Cream Gold */
        
        .nested-bundle-item { font-size: 12px; color: #444; margin-left: 15px; padding: 4px 0; border-bottom: 1px dashed rgba(0,0,0,0.05); }
        .nested-bundle-item:last-child { border-bottom: none; }
        
        .options-section { width: 100%; max-width: 600px; margin-top: 20px; padding: 15px; background: #fff; border-radius: 15px; }
        .total-box { font-size: 1.2em; margin: 20px 0; text-align: right; width: 100%; max-width: 600px; line-height: 1.6; }
        .grand-total-row { font-size: 1.5em; font-weight: bold; color: #395763; border-top: 2px solid #395763; padding-top: 10px; margin-top: 10px; }
        #paypal-button-container { width: 100%; max-width: 350px; margin-top: 20px; }
        .input-style { padding: 8px; border-radius: 8px; border: 1px solid #ccc; margin-top: 5px; }
        .remove-btn { color: red; border: none; background: none; cursor: pointer; text-decoration: underline; margin-left: 10px; font-size: 11px; }
        .qty-adjust { padding: 2px 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Complete Your Order</h2>
    <div id="master-list"></div>

    <div class="options-section">
        <h3>Choose Delivery Method</h3>
        <input type="radio" name="delivery" value="pickup" checked onclick="renderMasterCart()"> Local Pickup (Free)<br>
        <input type="radio" name="delivery" value="shipping" onclick="renderMasterCart()"> Shipping<br>
        
        <div id="shipping-options" style="display:none; margin-top:10px; padding-left: 20px;">
            <label>Destination:</label>
            <select id="ship-region" onchange="renderMasterCart()" class="input-style">
                <option value="US">United States ($9.50)</option>
                <option value="CA">Canada (Calculated Rate)</option> 
                <option value="INTL">International (Calculated Rate)</option>
            </select>
        </div>

        <h3>Enter Discount Code</h3>
        <input type="text" id="promo-input" placeholder="Enter code" class="input-style">
        <button onclick="renderMasterCart()" style="padding: 8px; cursor: pointer;">Apply</button>
        <div id="promo-msg" style="font-size: 12px; margin-top: 5px;"></div>
    </div>

    <div class="total-box">
        <div>Subtotal: $<span id="sub-total">0.00</span></div>
        <div id="promo-discount-row" style="color: #2F6B64; display:none;">Promo Discount: -$<span id="promo-discount-amt">0.00</span></div>
        <div>Shipping: $<span id="shipping-amt">0.00</span></div>
        <div>Tax (4%): $<span id="tax-amt">0.00</span></div>
        <div class="grand-total-row">Grand Total: $<span id="grand-total">0.00</span></div>
    </div>

    <div id="paypal-button-container"></div>

    <script src="https://www.paypal.com/sdk/js?client-id=AZfoLkPa3ut2MSEgAqM5ZINc3mDEHejbOhfjTWiBtdgvCSuBuhQ5Eobajkyxu5cSyTBuBfmwk9mTY4Vu"></script>
    
    <script>
        function updateQty(index, change) {
            let cart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
            cart[index].qty = (cart[index].qty || 1) + change;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            localStorage.setItem('final_shopping_cart', JSON.stringify(cart));
            renderMasterCart();
        }

        function removeMainItem(index) {
            let cart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('final_shopping_cart', JSON.stringify(cart));
            renderMasterCart();
        }

        function renderMasterCart() {
            const cartItems = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
            const container = document.getElementById('master-list');
            
            if (cartItems.length === 0) {
                container.innerHTML = "<p style='text-align:center;'>Your cart is empty.</p>";
                ['sub-total', 'shipping-amt', 'tax-amt', 'grand-total'].forEach(id => document.getElementById(id).textContent = "0.00");
                document.getElementById('promo-discount-row').style.display = "none";
                return;
            }

            let baseTotal = 0;
            let totalQty = 0;
            let htmlString = "";

            cartItems.forEach((item, index) => {
                const qty = item.qty || 1;
                const lineTotal = item.price * qty;
                baseTotal += lineTotal;
                totalQty += qty;

                if (item.isPackagedBundle) {
                    const colorIndex = ((item.bundleIndexNumber - 1) % 4) + 1; 
                    const subItemsRaw = item.details.split(' || ');
                    
                    let subItemsHtml = "";
                    subItemsRaw.forEach(subItem => {
                        let cleanSub = subItem.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:#e75480; font-weight:bold;">View Image</a>');
                        subItemsHtml += `<div class="nested-bundle-item">📦 ${cleanSub}</div>`;
                    });

                    htmlString += `
                        <div class="packaged-bundle-card bundle-color-${colorIndex}">
                            <div style="display:flex; justify-content:between; align-items:center; font-weight:bold; color:#222; font-size:14px; margin-bottom:8px;">
                                <div style="flex:1;">🛍️ ${item.name} (Multi-Item Set) <button onclick="removeMainItem(${index})" class="remove-btn">[ Dissolve Bundle ]</button></div>
                                <div style="display:flex; align-items:center; gap:5px; margin-right:15px;">
                                    <button class="qty-adjust" onclick="updateQty(${index}, -1)">-</button>
                                    <span>${qty}</span>
                                    <button class="qty-adjust" onclick="updateQty(${index}, 1)">+</button>
                                </div>
                                <div>$${lineTotal.toFixed(2)}</div>
                            </div>
                            ${subItemsHtml}
                        </div>`;
                } else {
                    let cleanDetails = (item.details || '').replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color: #395763; text-decoration: underline;">View Photo</a>');
                    htmlString += `
                        <div class="cart-item">
                            <div>
                                <b>${item.name}</b><br>
                                <small style="color:#666;">${cleanDetails}</small>
                                <button onclick="removeMainItem(${index})" class="remove-btn">[ REMOVE ]</button>
                            </div>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <button onclick="updateQty(${index}, -1)">-</button>
                                <span>${qty}</span>
                                <button onclick="updateQty(${index}, 1)">+</button>
                            </div>
                            <div><b>$${lineTotal.toFixed(2)}</b></div>
                        </div>`;
                }
            });

            container.innerHTML = htmlString;

            // --- Fixed #5: Restored flat-rate discount configuration and floor logic ---
            const promoInput = document.getElementById('promo-input').value.trim().toUpperCase();
            const promoMsg = document.getElementById('promo-msg');
            let promoDiscountAmt = 0;
            const validPromos = { 
                "MOTHERSDAY": { type: "percent", value: 0.10 },
                "VIP20": { type: "percent", value: 0.20 },
                "SAVE10": { type: "flat", value: 10.00 }
            };

            if (promoInput !== "") {
                if (validPromos[promoInput]) {
                    const promo = validPromos[promoInput];
                    promoDiscountAmt = promo.type === "percent" ? baseTotal * promo.value : promo.value;
                    if (promoDiscountAmt > baseTotal) promoDiscountAmt = baseTotal; // Protection floor logic
                    
                    promoMsg.style.color = "#28a745"; 
                    promoMsg.textContent = "Promo Code applied!";
                    document.getElementById('promo-discount-row').style.display = "block";
                } else {
                    promoMsg.style.color = "#dc3545"; 
                    promoMsg.textContent = "Invalid or expired code.";
                    document.getElementById('promo-discount-row').style.display = "none";
                }
            } else {
                promoMsg.textContent = "";
                document.getElementById('promo-discount-row').style.display = "none";
            }

            // --- Fixed #2: Restored scaled shipping calculations for Canada & International ---
            const deliveryType = document.querySelector('input[name="delivery"]:checked').value;
            let shippingCost = 0;

            if (deliveryType === 'shipping') {
                document.getElementById('shipping-options').style.display = 'block';
                const selectedRegion = document.getElementById('ship-region').value;
                if (selectedRegion === "US") {
                    shippingCost = 9.50;
                } else if (selectedRegion === "CA") {
                    if (totalQty >= 8) shippingCost = 75.00;
                    else if (totalQty >= 4) shippingCost = 40.00;
                    else shippingCost = 25.00;
                } else if (selectedRegion === "INTL") {
                    if (totalQty >= 8) shippingCost = 135.00;
                    else if (totalQty >= 4) shippingCost = 95.00;
                    else shippingCost = 65.00;
                }
            } else {
                document.getElementById('shipping-options').style.display = 'none';
            }

            let finalTaxable = Math.max(0, baseTotal - promoDiscountAmt);
            let tax = finalTaxable * 0.04;
            let grandTotal = finalTaxable + shippingCost + tax;

            document.getElementById('sub-total').textContent = baseTotal.toFixed(2);
            document.getElementById('promo-discount-amt').textContent = promoDiscountAmt.toFixed(2);
            document.getElementById('shipping-amt').textContent = shippingCost.toFixed(2);
            document.getElementById('tax-amt').textContent = tax.toFixed(2);
            document.getElementById('grand-total').textContent = grandTotal.toFixed(2);
        }

        // --- Fixed #1: Restored Pushover backend logic ---
        function sendPushNotification(total) {
            fetch("https://api.pushover.net/1/messages.json", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({
                    token: "au8jzsjjx9wz4dxvgc95h9nj86mzgz", 
                    user: "ueb3ouifx46g56n7by3rfh198nmagb",   
                    title: "New Sale! 💰",
                    message: "You just received an order for $" + total,
                    priority: 1
                })
            });
        }

        // --- Fixed #1: Restored EmailJS item parsing logic ---
        async function sendOrderEmail() {
            const cartItems = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
            let photoLink = "";

            cartItems.forEach(item => {
                const text = (item.details || "");
                const match = text.match(/https?:\/\/[^\s]+/);
                if (match && !photoLink) photoLink = match[0];
            });

            let summary = "";
            cartItems.forEach(i => {
                summary += `• ${i.name} (x${i.qty})\n  Details: ${i.details || 'None'}\n\n`;
            });

            const templateParams = {
                from_name: "Website Customer",    
                from_email: "Check PayPal",       
                cust_name: "Order Received",      
                design_image: photoLink,          
                order_details: summary,           
                grand_total: document.getElementById('grand-total').textContent
            };

            console.log("Sending to EmailJS:", templateParams);

            return emailjs.send('service_ezq1fuc', 'template_ut1r5xk', templateParams)
                .then(() => console.log("Email Sent Successfully"))
                .catch(err => console.error("Email Failed:", err));
        }

        paypal.Buttons({
            createOrder: (data, actions) => {
                const cartItems = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
                
                // --- Fixed #4: Injected variety and addons into the PayPal item descriptions ---
                let allItems = cartItems.map(item => ({
                    name: item.name,
                    description: `${item.variety || ''} ${item.addons || ''} ${(item.details || "Store Item")}`.trim().substring(0, 127),
                    unit_amount: { currency_code: "USD", value: item.price.toFixed(2) },
                    quantity: item.qty || 1
                }));

               /*const promoDiscount = parseFloat(document.getElementById('promo-discount-amt').textContent) || 0;
                if (promoDiscount > 0) {
                    allItems.push({
                        name: "Coupon Discount",
                        unit_amount: { currency_code: "USD", value: (-promoDiscount).toFixed(2) },
                        quantity: 1
                    });
                }*/
                purchase_units: [{
                    amount: {
                        currency_code: "USD",
                        value: document.getElementById('grand-total').textContent
                    }
                }]

                return actions.order.create({
                    purchase_units: [{
                        amount: {
                            currency_code: "USD",
                            value: document.getElementById('grand-total').textContent,
                            breakdown: {
                                item_total: { currency_code: "USD", value: (parseFloat(document.getElementById('sub-total').textContent) - promoDiscount).toFixed(2) },
                                shipping: { currency_code: "USD", value: document.getElementById('shipping-amt').textContent },
                                tax_total: { currency_code: "USD", value: document.getElementById('tax-amt').textContent }
                            }
                        },
                        items: allItems 
                    }]
                });
            },
            onApprove: (data, actions) => {
                return actions.order.capture().then(async () => {
                    console.log("Payment Captured");
                    const total = document.getElementById('grand-total').textContent;

                    // --- Fixed #1: Re-implemented push and email dispatch steps during execution ---
                    try {
                        sendPushNotification(total);
                    } catch(e) { console.log("Push failed"); }

                    if (window.emailjs) {
                        try {
                            await sendOrderEmail();
                            console.log("Email attempt finished");
                        } catch (err) {
                            console.error("Email function failed:", err);
                        }
                    } else {
                        console.error("EmailJS not defined, skipping email step.");
                    }

                    // Always clear cart components and perform route update
                    ['final_shopping_cart', 'my_custom_bundle'].forEach(k => localStorage.removeItem(k));
                    window.location.href = "thank-you.html";
                });
            }
        }).render('#paypal-button-container');
        onError: function(err) {
    console.error("PAYPAL ERROR:", err);
},

onCancel: function(data) {
    console.log("PAYPAL CANCELLED:", data);
},
        createOrder: function(data, actions) {
    console.log("Create Order Started");
    
    return actions.order.create({
        purchase_units: [{
            amount: {
                currency_code: "USD",
                value: "1.00"
            }
        }]
    });
},
        renderMasterCart();
    </script>
</body>
</html>
