<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 20px 0 0 0; display: flex; flex-direction: column; align-items: center; gap: 8px; font-family: sans-serif; min-height: 100vh; box-sizing: border-box; justify-content: flex-start; background: transparent; overflow: hidden; }
        html { overflow: hidden; height: 100%; }
        .input-group { display: flex; flex-direction: column; gap: 5px; width: 220px; }
        .label-row { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }
        .label-text { font-size: 10px; color: #000; font-weight: bold; }
        .char-count { font-size: 9px; color: #999; }
        input[type="text"], input[type="file"], select { padding: 8px; border-radius: 12px; border: 1px solid #ddd; font-size: 12px; outline: none; width: 100%; box-sizing: border-box; }
        #add-btn { background-color: #e75480; color: white; border: none; padding: 10px 24px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 5px; }
        #add-btn:disabled { background: #ccc; cursor: not-allowed; }
        .status { font-size: 10px; color: #000; height: 12px; font-weight: bold; text-align: center; }
        .btn-blue {background-color: #2F6B64 !important;}
        .hidden { display: none !important; }
        .button-container {display: flex;gap: 10px; /* Space between buttons */margin-bottom: 10px;}
        .toggle-btn {flex: 1; padding: 5px 7px;font-size: 12px;background-color: #CAE4DB;border: 1px solid #b9d4cb;border-radius: 12px; cursor: pointer;transition: background 0.2s;}
        .toggle-btn:hover {background-color: #89a3e9;}
    </style>
</head>
<div class="input-group">
    <div class="button-container">
        <button type="button" id="toggle-note" class="toggle-btn" onclick="toggleSection('note-wrap')">Add Note</button>
        <button type="button" id="toggle-upload" class="toggle-btn" onclick="toggleSection('upload-wrap')">Upload Photo</button>
    </div>

    <div id="note-wrap" class="hidden">
        <div class="label-row">
            <span class="label-text">Notes:</span>
            <span id="char-count" class="char-count">0/200</span>
        </div>
        <input type="text" id="custom-msg" maxlength="200" placeholder="Type your note here...">
    </div>

    <div id="upload-wrap" class="hidden">
        <span class="label-text">Upload Photo:</span>
        <input type="file" id="image-upload" accept="image/*">
        <div id="upload-status" class="status"></div>
    </div>
    
    <div id="addon-section" style="display: none;">
        <div id="regular-add-on-wrap">
            <span class="label-text" id="select-label">Add-On Items:</span>
            <select id="addon-select"></select>
        </div>
        
        <div id="dynamic-vars-container"></div>
    </div>

    <button id="add-btn">Loading...</button>
</div>

   <script>
    const CLOUD_NAME = "dim_image_uploads"; 
    const UPLOAD_PRESET = "dim_image_uploads"; 
    const params = new URLSearchParams(window.location.search);
    const itemName = params.get('name') || "Item";
    const itemPrice = parseFloat(params.get('price')) || 0.00;
    const itemType = params.get('type'); 
    
    const addonSection = document.getElementById('addon-section');
    const addonSelect = document.getElementById('addon-select');
    const btn = document.getElementById('add-btn');
    const msgInput = document.getElementById('custom-msg');
    const charCounter = document.getElementById('char-count');

    // --- UI SETUP ---
    if (itemType === 'simple') {
        document.getElementById('toggle-note').classList.add('hidden');
        document.getElementById('toggle-upload').classList.add('hidden');
        addonSection.style.display = 'none';
        btn.classList.add('btn-blue');
    } 
    else if (itemType === 'premade') {
        addonSection.style.display = 'block';
        const opts = ["None", "Heart Wood Key Chain (+ $3)", "Circle Wood Key Chain (+ $3)", "Aluminum Key Chain (+ $3)", "Aluminum Bookmark (+ $4)", "Small Photo Magnet (+ $6)"];
        addonSelect.innerHTML = opts.map(o => `<option value="${o}">${o}</option>`).join('');
    } 
    else if (itemType === 'shirts' || itemType === 'shirt-bundle') {
        const varsParam = params.get('vars');
        if (varsParam) {
            addonSection.style.display = 'block';
            document.getElementById('regular-add-on-wrap').classList.add('hidden');
            const sets = varsParam.split('|||');
            
            sets.forEach((set, index) => {
                const [header, options] = set.split(':');
                const label = document.createElement('span');
                label.className = 'label-text';
                label.textContent = header + ":";
                addonSection.appendChild(label);
                
                const newSelect = document.createElement('select');
                newSelect.className = 'shirt-select';
                // Unique ID based on header and index
                const typeKey = header.toLowerCase().includes('color') ? 'color' : 'size';
                newSelect.id = `${typeKey}-${index}`; 

                options.split(',').forEach(opt => {
                    const [val, price] = opt.split('|');
                    newSelect.innerHTML += `<option value="${val}" data-price="${price}">${val} (+$${price})</option>`;
                });
                addonSection.appendChild(newSelect);
            });

            // Linking logic for color/size dependencies
            const colorMenu = addonSection.querySelector('[id^="color-"]');
            const sizeMenu = addonSection.querySelector('[id^="size-"]');
            if (colorMenu && sizeMenu) {
                colorMenu.addEventListener('change', () => updateBundleSize(colorMenu.value, sizeMenu));
                updateBundleSize(colorMenu.value, sizeMenu);
            }
        }
        btn.classList.add('btn-blue');
    }
    else if (itemType === 'regular' || itemType === 'custom-bundle') {
        const varsParam = params.get('vars');
        if (varsParam) {
            addonSection.style.display = 'block';
            document.getElementById('select-label').textContent = "SELECT VARIETY:";
            const vars = varsParam.split(',');
            addonSelect.innerHTML = vars.map(v => {
                const [l, p] = v.split('|');
                return `<option value="${l}" data-price="${p}">${l} (+$${p})</option>`;
            }).join('');
        }
        btn.classList.add('btn-blue');
    }

    btn.textContent = (['bundle', 'custom-bundle', 'shirt-bundle'].includes(itemType)) ? "Add to Bundle" : "Add to Cart";

    // --- HELPER FUNCTIONS ---
    function updateBundleSize(color, sizeSelect) {
        const limited = ["Navy Blue", "Lime Green", "Purple", "Sport Gray", "Safety Pink", "Irish Green", "Tangerine", "Sand", "Light Pink", "Sage", "Dusty Rose", "Light Blue"];
        const isLimited = limited.includes(color);
        Array.from(sizeSelect.options).forEach(opt => {
            const forbidden = (opt.value === "2XL" || opt.value === "3XL");
            opt.disabled = isLimited && forbidden;
            if (isLimited && forbidden && sizeSelect.value === opt.value) sizeSelect.value = "S";
        });
    }

    function toggleSection(id) {
        document.getElementById(id).classList.toggle('hidden');
    }

    // --- CLICK LOGIC ---
    // --- CLICK LOGIC UPDATE ---
btn.onclick = async function() {
    const status = document.getElementById('upload-status');
    const fileInput = document.getElementById('image-upload');
    let finalMsg = msgInput.value;
    btn.disabled = true;

    // 1. Handle Cloudinary Upload
    if (fileInput && fileInput.files.length > 0) {
        status.textContent = "Uploading Image...";
        try {
            const fd = new FormData();
            fd.append('file', fileInput.files[0]);
            fd.append('upload_preset', UPLOAD_PRESET);

            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { 
                method: 'POST', 
                body: fd 
            });

            if (!res.ok) throw new Error('Upload failed');

            const data = await res.json();
            
            // This creates a clean "Link: https://..." entry in your notes
            const photoLink = `Pic: ${data.secure_url}`;
            finalMsg = finalMsg ? `${finalMsg} | ${photoLink}` : photoLink;
            
            status.style.color = "green";
            status.textContent = "Upload Success!";
        } catch (e) { 
            status.style.color = "red";
            status.textContent = "Upload Failed!";
            btn.disabled = false;
            return; // Stop the process so they can try again
        }
    }

    // ... [The rest of your logic gate for Cart/Bundle follows here]

        // --- THE LOGIC GATE ---
        const cleanName = itemName.replace(/_/g, ' ');
        
        // Group A: Main Shopping Cart
        if (['simple', 'regular', 'premade', 'shirts'].includes(itemType)) {
            let cart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
            let priceInc = 0;
            let details = finalMsg;

            if (itemType === 'shirts') {
                const selects = document.querySelectorAll('.shirt-select');
                selects.forEach(s => {
                    const opt = s.options[s.selectedIndex];
                    priceInc += parseFloat(opt.dataset.price) || 0;
                    details += ` | ${opt.value}`;
                });
            } else {
                const sel = addonSelect.options[addonSelect.selectedIndex];
                if (sel && itemType !== 'simple') {
                    priceInc = parseFloat(sel.dataset.price) || 0;
                    if (itemType === 'premade') {
                        const m = sel.value.match(/\$\s*(\d+)/);
                        if (m) priceInc = parseFloat(m[1]);
                    }
                    details += (sel.value !== "None") ? ` | ${sel.value}` : "";
                }
            }

            cart.push({ name: cleanName, price: itemPrice + priceInc, details: details.trim(), qty: 1 });
            localStorage.setItem('final_shopping_cart', JSON.stringify(cart));
        } 
        
        // Group B: Custom/Shirt Bundle
        else if (['custom-bundle', 'shirt-bundle'].includes(itemType)) {
            let bundle = JSON.parse(localStorage.getItem('my_custom_bundle')) || [];
            let priceInc = 0;
            let details = finalMsg;

            const selects = (itemType === 'shirt-bundle') ? document.querySelectorAll('.shirt-select') : [addonSelect];
            selects.forEach(s => {
                const opt = s.options[s.selectedIndex];
                if (opt) {
                    priceInc += parseFloat(opt.dataset.price) || 0;
                    details += ` | ${opt.value}`;
                }
            });

            bundle.push({ name: cleanName, price: itemPrice + priceInc, message: details.trim() });
            localStorage.setItem('my_custom_bundle', JSON.stringify(bundle));
            window.dispatchEvent(new Event('storage'));
        }

        // Group C: Standard Bundle
        else if (itemType === 'bundle') {
            let bundle = JSON.parse(localStorage.getItem('my_bundle')) || [];
            bundle.push({ name: cleanName, price: itemPrice, message: finalMsg || "No notes" });
            localStorage.setItem('my_bundle', JSON.stringify(bundle));
            window.dispatchEvent(new Event('storage'));
        }

        // Success Animation
        status.textContent = ""; 
        btn.textContent = "Added!";
        btn.style.background = "#28a745";
        setTimeout(() => {
            btn.disabled = false;
            btn.style.background = "";
            btn.textContent = (['bundle', 'custom-bundle', 'shirt-bundle'].includes(itemType)) ? "Add to Bundle" : "Add to Cart";
            msgInput.value = "";
            if(fileInput) fileInput.value = "";
            status.textContent = ""; // <--- Add this to clear the "Success" message
        }, 1000);
    };
</script>
</body>
</html>
