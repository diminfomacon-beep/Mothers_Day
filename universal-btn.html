<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; font-family: sans-serif; height: 100vh; box-sizing: border-box; justify-content: flex-start; background: transparent; padding-top:20px; overflow: hidden;}
        html, body {overflow: hidden;width: 100%;}
        .input-group { display: flex; flex-direction: column; gap: 5px; width: 220px; }
        .label-row { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }
        .label-text { font-size: 10px; color: #e75480; font-weight: bold; }
        .char-count { font-size: 9px; color: #999; }
        input[type="text"], input[type="file"] { padding: 8px; border-radius: 12px; border: 1px solid #ddd; font-size: 12px; outline: none; width: 100%; box-sizing: border-box; }
        #add-btn { background-color: #e75480; color: white; border: none; padding: 10px 24px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 5px; }
        #add-btn:disabled { background: #ccc; cursor: not-allowed; }
        .status { font-size: 10px; color: #e75480; height: 12px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <div class="input-group">
        <div class="label-row">
            <span class="label-text">GIFT MESSAGE:</span>
            <span id="char-count" class="char-count">0/200</span>
        </div>
        <input type="text" id="custom-msg" maxlength="200" placeholder="Type your note here...">
        <span class="label-text">UPLOAD PHOTO:</span>
        <input type="file" id="image-upload" accept="image/*">
        <div id="upload-status" class="status"></div>
        <button id="add-btn">Loading...</button>
    </div>

    <script>
        const CLOUD_NAME = "dim_image_uploads"; 
        const UPLOAD_PRESET = "dim_image_uploads"; 
        
        const params = new URLSearchParams(window.location.search);
        const itemName = params.get('name') || "Item";
        const itemPrice = parseFloat(params.get('price')) || 0.00;
        const itemType = params.get('type'); 

        // --- NEW BUTTON TEXT LOGIC ---
        const btn = document.getElementById('add-btn');
        const defaultText = (itemType === 'bundle') ? "Add to Bundle" : "Add to Cart";
        btn.textContent = defaultText;

        const msgInput = document.getElementById('custom-msg');
        const charCounter = document.getElementById('char-count');

        msgInput.oninput = function() {
            const count = this.value.length;
            charCounter.textContent = count + "/200";
            charCounter.style.color = count >= 180 ? "#e75480" : "#999";
        };

        btn.onclick = async function() {
            const status = document.getElementById('upload-status');
            const fileInput = document.getElementById('image-upload');
            const msg = msgInput.value;
            let finalMsg = msg;

            btn.disabled = true;
            
            if (fileInput.files.length > 0) {
                status.textContent = "Uploading Image...";
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                formData.append('upload_preset', UPLOAD_PRESET);

                try {
                    const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    finalMsg += (finalMsg ? " | Pic: " : "Pic: ") + data.secure_url;
                } catch (err) {
                    alert("Upload failed. Try again.");
                    btn.disabled = false;
                    status.textContent = "";
                    return;
                }
            }

            if (itemType === 'premade') {
                let finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
                finalCart.push({ name: itemName.replace(/_/g, ' '), price: itemPrice, details: finalMsg, qty: 1 });
                localStorage.setItem('final_shopping_cart', JSON.stringify(finalCart));
            } else {
                let bundle = JSON.parse(localStorage.getItem('my_bundle')) || [];
                bundle.push({ name: itemName, price: itemPrice, message: finalMsg });
                localStorage.setItem('my_bundle', JSON.stringify(bundle));
            }
            
            status.textContent = "";
            btn.textContent = "Added!";
            btn.style.background = "#28a745";
            setTimeout(() => {
                btn.textContent = defaultText; // Resets back to the correct dynamic text
                btn.style.background = "#e75480";
                btn.disabled = false;
                fileInput.value = "";
                msgInput.value = "";
                charCounter.textContent = "0/200";
            }, 1000);
        };
    </script>
</body>
</html>
