<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 20px 0 0 0; display: flex; flex-direction: column; align-items: center; gap: 8px; font-family: sans-serif; min-height: 100vh; box-sizing: border-box; justify-content: flex-start; background: transparent; overflow: hidden; }
        html { overflow: hidden; height: 100%; }
        .input-group { display: flex; flex-direction: column; gap: 5px; width: 220px; }
        .label-row { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }
        .label-text { font-size: 10px; color: #e75480; font-weight: bold; }
        .char-count { font-size: 9px; color: #999; }
        input[type="text"], input[type="file"], select { padding: 8px; border-radius: 12px; border: 1px solid #ddd; font-size: 12px; outline: none; width: 100%; box-sizing: border-box; }
        #add-btn { background-color: #e75480; color: white; border: none; padding: 10px 24px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 5px; }
        #add-btn:disabled { background: #ccc; cursor: not-allowed; }
        .status { font-size: 10px; color: #e75480; height: 12px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <div class="input-group">
        <div class="label-row">
            <span class="label-text">NOTE/SPECIAL INSTRUCTIONS:</span>
            <span id="char-count" class="char-count">0/200</span>
        </div>
        <input type="text" id="custom-msg" maxlength="200" placeholder="Type your note here...">
        <span class="label-text" id="dynamic-label">UPLOAD PHOTO IF APPLICABLE:</span>
        <input type="file" id="image-upload" accept="image/*">
        <div id="upload-status" class="status"></div>
        
        <div id="addon-section" style="display: none;">
            <span class="label-text" id="select-label">CHOOSE ADD-ON:</span>
            <select id="addon-select"></select>
        </div>

        <button id="add-btn">Loading...</button>
    </div>

    <script>
        const CLOUD_NAME = "dim_image_uploads"; 
        const UPLOAD_PRESET = "dim_image_uploads"; 
        const params = new URLSearchParams(window.location.search);
        const itemName = params.get('name') || "Item";
        const itemPrice = parseFloat(params.get('price')) || 0.00;
        const itemType = params.get('type'); 
        
        const addonSection = document.getElementById('addon-section');
        const addonSelect = document.getElementById('addon-select');
        const btn = document.getElementById('add-btn');
        const msgInput = document.getElementById('custom-msg');
        const charCounter = document.getElementById('char-count');

        // --- NEW: Setup Dynamic UI ---
       if (itemType === 'premade') {
            addonSection.style.display = 'block';
            const opts = ["None", "Heart Wood Key Chain (+ $3)", "Circle Wood Key Chain (+ $3)", "Aluminum Key Chain (+ $3)", "Aluminum Bookmark (+ $4)", "Small Photo Magnet (+ $6)"];
            opts.forEach(o => addonSelect.innerHTML += `<option value="${o}">${o}</option>`);
        } 
        else if (itemType === 'regular') {
            // Only show the section IF 'vars' parameter exists and isn't empty
            const varsParam = params.get('vars');
            if (varsParam && varsParam.length > 0) {
                addonSection.style.display = 'block';
                document.getElementById('select-label').textContent = "CHOOSE VARIETY:";
                btn.style.backgroundColor = "#395763";
                
                const vars = varsParam.split(',');
                vars.forEach(v => {
                    const [label, price] = v.split('|');
                    addonSelect.innerHTML += `<option value="${label}" data-price="${price}">${label} (+$${price})</option>`;
                });
            }
        }

        btn.textContent = (itemType === 'bundle') ? "Add to Bundle" : "Add to Cart";

        msgInput.oninput = function() {
            const count = this.value.length;
            charCounter.textContent = count + "/200";
            charCounter.style.color = count >= 180 ? "#e75480" : "#999";
        };

        btn.onclick = async function() {
            const status = document.getElementById('upload-status');
            const fileInput = document.getElementById('image-upload');
            let finalMsg = msgInput.value;
            btn.disabled = true;
            
            if (fileInput.files.length > 0) {
                status.textContent = "Uploading...";
                const fd = new FormData();
                fd.append('file', fileInput.files[0]);
                fd.append('upload_preset', UPLOAD_PRESET);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
                const data = await res.json();
                finalMsg += (finalMsg ? " | Pic: " : "Pic: ") + data.secure_url;
            }

            // --- LOGIC GATE ---
            if (itemType === 'premade') {
                let finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
                let priceInc = 0;
                const sel = addonSelect.value;
                if (sel && sel !== "None") {
                    const match = sel.match(/\$\s*(\d+)/);
                    if (match) priceInc = parseFloat(match[1]);
                }
                finalCart.push({ name: itemName.replace(/_/g, ' '), price: itemPrice + priceInc, details: finalMsg + (sel ? " | Add-on: " + sel : ""), qty: 1 });
                localStorage.setItem('final_shopping_cart', JSON.stringify(finalCart));
            } 
            else if (itemType === 'regular') {
                let finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
                const sel = addonSelect.options[addonSelect.selectedIndex];
                const priceInc = parseFloat(sel.dataset.price) || 0;
                finalCart.push({ name: itemName.replace(/_/g, ' '), price: itemPrice + priceInc, details: finalMsg + " | Variety: " + sel.value, qty: 1 });
                localStorage.setItem('final_shopping_cart', JSON.stringify(finalCart));
            } 
            else {
                let bundle = JSON.parse(localStorage.getItem('my_bundle')) || [];
                bundle.push({ name: itemName, price: itemPrice, message: finalMsg });
                localStorage.setItem('my_bundle', JSON.stringify(bundle));
            }
            
            status.textContent = ""; btn.textContent = "Added!";
            btn.style.background = "#28a745";
            setTimeout(() => { location.reload(); }, 1000);
        };
    </script>
</body>
</html>
