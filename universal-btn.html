<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 20px 0 0 0; display: flex; flex-direction: column; align-items: center; gap: 8px; font-family: sans-serif; min-height: 100vh; box-sizing: border-box; justify-content: flex-start; background: transparent; overflow: hidden; }
        html { overflow: hidden; height: 100%; }
        .input-group { display: flex; flex-direction: column; gap: 5px; width: 220px; }
        .label-row { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }
        .label-text { font-size: 10px; color: #000; font-weight: bold; }
        .char-count { font-size: 9px; color: #999; }
        input[type="text"], input[type="file"], select { padding: 8px; border-radius: 12px; border: 1px solid #ddd; font-size: 12px; outline: none; width: 100%; box-sizing: border-box; }
        #add-btn { background-color: #e75480; color: white; border: none; padding: 10px 24px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 5px; }
        #add-btn:disabled { background: #ccc; cursor: not-allowed; }
        .status { font-size: 10px; color: #000; height: 12px; font-weight: bold; text-align: center; }
        .btn-blue {background-color: #395763 !important;}
        .hidden { display: none !important; }
        .button-container {display: flex;gap: 10px; /* Space between buttons */margin-bottom: 10px;}
        .toggle-btn {flex: 1; padding: 5px 7px;font-size: 12px;background-color: #E6E6FA;border: 1px solid #c5c5dd;border-radius: 15px; cursor: pointer;transition: background 0.2s;}
        .toggle-btn:hover {background-color: #89a3e9;}
    </style>
</head>
<div class="input-group">
    <div class="button-container">
        <button type="button" id="toggle-note" class="toggle-btn" onclick="toggleSection('note-wrap')">Add Note</button>
        <button type="button" id="toggle-upload" class="toggle-btn" onclick="toggleSection('upload-wrap')">Upload Photo</button>
    </div>

    <div id="note-wrap" class="hidden">
        <div class="label-row">
            <span class="label-text">Notes:</span>
            <span id="char-count" class="char-count">0/200</span>
        </div>
        <input type="text" id="custom-msg" maxlength="200" placeholder="Type your note here...">
    </div>

    <div id="upload-wrap" class="hidden">
        <span class="label-text">Upload Photo:</span>
        <input type="file" id="image-upload" accept="image/*">
        <div id="upload-status" class="status"></div>
    </div>
    
    <div id="addon-section" style="display: none;">
        <div id="regular-add-on-wrap">
            <span class="label-text" id="select-label">Add-On Items:</span>
            <select id="addon-select"></select>
        </div>
        
        <div id="dynamic-vars-container"></div>
    </div>

    <button id="add-btn">Loading...</button>
</div>

    <script>
        const CLOUD_NAME = "dim_image_uploads"; 
        const UPLOAD_PRESET = "dim_image_uploads"; 
        const params = new URLSearchParams(window.location.search);
        const itemName = params.get('name') || "Item";
        const itemPrice = parseFloat(params.get('price')) || 0.00;
        const itemType = params.get('type'); 
        
        const addonSection = document.getElementById('addon-section');
        const addonSelect = document.getElementById('addon-select');
        const btn = document.getElementById('add-btn');
        const msgInput = document.getElementById('custom-msg');
        const charCounter = document.getElementById('char-count');
        const inputGroup = document.querySelector('.input-group');
        const dynamicContainer = document.getElementById('dynamic-vars-container');

       // --- UI SETUP ---
        if (itemType === 'simple') {
            // Hide everything for Simple items
            document.querySelector('.input-group').children[0].classList.add('hidden');
            document.getElementById('custom-msg').classList.add('hidden');
            document.querySelectorAll('.label-text')[0].classList.add('hidden');
            document.querySelectorAll('.label-text')[1].classList.add('hidden');
            document.getElementById('image-upload').classList.add('hidden');
            addonSection.style.display = 'none';
            btn.classList.add('btn-blue'); // Blue
        } 
        else if (itemType === 'premade') {
            addonSection.style.display = 'block';
            const opts = ["None", "Heart Wood Key Chain (+ $3)", "Circle Wood Key Chain (+ $3)", "Aluminum Key Chain (+ $3)", "Aluminum Bookmark (+ $4)", "Small Photo Magnet (+ $6)"];
            opts.forEach(o => addonSelect.innerHTML += `<option value="${o}">${o}</option>`);
            // Pink button (default, no class needed)
        } 
        else if (itemType === 'regular') {
            // 1. Build the menu if vars exist
            const varsParam = params.get('vars');
            if (varsParam) {
                addonSection.style.display = 'block';
                document.getElementById('select-label').textContent = "CHOOSE VARIETY:";
                
                const vars = varsParam.split(',');
                vars.forEach(v => {
                    const [label, price] = v.split('|');
                    addonSelect.innerHTML += `<option value="${label}" data-price="${price}">${label} (+$${price})</option>`;
                });
            }
            btn.classList.add('btn-blue'); // Blue
        }
            // --- UI SETUP ---
        else if (itemType === 'custom-bundle') {
            const varsParam = params.get('vars');
            if (varsParam) {
                addonSection.style.display = 'block';
                document.getElementById('select-label').textContent = "SELECT VARIETY:";
                
                const vars = varsParam.split(',');
                vars.forEach(v => {
                    const [label, price] = v.split('|');
                    // Ensure this adds to the addonSelect dropdown
                    addonSelect.innerHTML += `<option value="${label}" data-price="${price}">${label} (+$${price})</option>`;
                });
            }
        }
        else if (itemType === 'shirts') {
            const varsParam = params.get('vars'); // Example: "Size:S|0,M|0|||Print:Classic|0,Distressed|2"
            if (varsParam) {
                addonSection.style.display = 'block';
                document.getElementById('regular-add-on-wrap').classList.add('hidden');
                const dynamicContainer = document.getElementById('dynamic-vars-container');
                // Split the two sets (Size and Print)
                const sets = varsParam.split('|||');
                
                sets.forEach(set => {
                    const [header, options] = set.split(':');
                    
                    // Create a label for each set
                    addonSection.innerHTML += `<span class="label-text">${header}:</span>`;
                    
                    // Create a specific select for this set
                    const newSelect = document.createElement('select');
                    newSelect.className = 'shirt-select';
                    
                    options.split(',').forEach(opt => {
                        const [label, price] = opt.split('|');
                        newSelect.innerHTML += `<option value="${label}" data-price="${price}">${label} (+$${price})</option>`;
                    });
                    
                    addonSection.appendChild(newSelect);
                });
            }
            btn.classList.add('btn-blue');
        }
        // Now it will say "Add to Bundle" for both the original and your new custom bundle
        btn.textContent = (itemType === 'bundle' || itemType === 'custom-bundle') ? "Add to Bundle" : "Add to Cart";
        msgInput.oninput = function() {
            const count = this.value.length;
            charCounter.textContent = count + "/200";
            charCounter.style.color = count >= 180 ? "#e75480" : "#999";
        };
       btn.onclick = async function() {
            const status = document.getElementById('upload-status');
            const fileInput = document.getElementById('image-upload');
            let finalMsg = msgInput.value;
            btn.disabled = true;
            
            // Cloudinary Upload Logic (only if a file is actually selected)
            if (fileInput && fileInput.files.length > 0) {
                status.textContent = "Uploading...";
                const fd = new FormData();
                fd.append('file', fileInput.files[0]);
                fd.append('upload_preset', UPLOAD_PRESET);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
                const data = await res.json();
                finalMsg += (finalMsg ? " | Pic: " : "Pic: ") + data.secure_url;
            }
        // Add this at the very end of your UI SETUP block (before the btn.onclick)
btn.textContent = (itemType === 'bundle' || itemType === 'custom-bundle') ? "Add to Bundle" : "Add to Cart";
            // --- LOGIC GATE ---
            if (itemType === 'premade') {
                let finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
                let priceInc = 0;
                const sel = addonSelect.value;
                if (sel && sel !== "None") {
                    const match = sel.match(/\$\s*(\d+)/);
                    if (match) priceInc = parseFloat(match[1]);
                }
                finalCart.push({ name: itemName.replace(/_/g, ' '), price: itemPrice + priceInc, details: finalMsg + (sel ? " | Add-on: " + sel : ""), qty: 1 });
                localStorage.setItem('final_shopping_cart', JSON.stringify(finalCart));
            } 
                        else if (itemType === 'regular') {
                let finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
                const sel = addonSelect.options[addonSelect.selectedIndex];
                const priceInc = parseFloat(sel.dataset.price) || 0;
                finalCart.push({ name: itemName.replace(/_/g, ' '), price: itemPrice + priceInc, details: finalMsg + " | Variety: " + sel.value, qty: 1 });
                localStorage.setItem('final_shopping_cart', JSON.stringify(finalCart));
            }
                          else if (itemType === 'custom-bundle') {
                let customBundle = JSON.parse(localStorage.getItem('my_custom_bundle')) || [];
                
                let priceInc = 0;
                let varietyDetails = ""; // This will hold the "Variety: X" string
                
                const sel = (addonSelect && addonSelect.options.length > 0) ? addonSelect.options[addonSelect.selectedIndex] : null;
            
                if (sel && sel.value !== "") {
                    priceInc = parseFloat(sel.dataset.price) || 0;
                    varietyDetails = " | Variety: " + sel.value;
                }
                
                customBundle.push({ 
                    name: itemName.replace(/_/g, ' '), 
                    price: itemPrice + priceInc, 
                    message: finalMsg + varietyDetails // Adding variety details to the message
                });
                
                localStorage.setItem('my_custom_bundle', JSON.stringify(customBundle));
                window.dispatchEvent(new Event('storage'));
            }
                
                localStorage.setItem('my_custom_bundle', JSON.stringify(customBundle));
                window.dispatchEvent(new Event('storage'));
            }
           else if (itemType === 'shirts') {
            let finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
            
            // Target the selects specifically inside your new container
            const selects = document.querySelectorAll('#dynamic-vars-container .shirt-select');
            let totalAddonPrice = 0;
            let selectedDetails = "";
        
            selects.forEach(sel => {
                const option = sel.options[sel.selectedIndex];
                totalAddonPrice += parseFloat(option.dataset.price) || 0;
                
                // Find the label text:
                // We look for the sibling element that comes before the select
                // In our new HTML structure, this is the label div
                const labelText = sel.previousElementSibling ? sel.previousElementSibling.textContent.replace(':', '') : "Option";
                
                selectedDetails += ` | ${labelText} : ${option.value}`;
            });
        
            finalCart.push({ 
                name: itemName.replace(/_/g, ' '), 
                price: itemPrice + totalAddonPrice, 
                details: (finalMsg ? finalMsg + " " : "") + selectedDetails, 
                qty: 1 
            });
            localStorage.setItem('final_shopping_cart', JSON.stringify(finalCart));
        }            else if (itemType === 'simple') {
                // NEW: Simple item logic
                let finalCart = JSON.parse(localStorage.getItem('final_shopping_cart')) || [];
                finalCart.push({ name: itemName.replace(/_/g, ' '), price: itemPrice, details: "As-is", qty: 1 });
                localStorage.setItem('final_shopping_cart', JSON.stringify(finalCart));
            }
            else if (itemType === 'bundle') {
                let bundle = JSON.parse(localStorage.getItem('my_bundle')) || [];
                bundle.push({ name: itemName.replace(/_/g, ' '), price: itemPrice, message: finalMsg });
                localStorage.setItem('my_bundle', JSON.stringify(bundle));
                
                // Trigger a window event so the same page (if needed) knows
                window.dispatchEvent(new Event('storage'));
                
                finalCart = null; 
            }
            
            // --- SUCCESS ANIMATION ---
            status.textContent = ""; 
            btn.textContent = "Added!";
            btn.style.background = "#28a745"; // Success Green
            
            setTimeout(() => {
                // 1. Reset text based on the item type
                // Update the revert logic inside the setTimeout:
                btn.textContent = (itemType === 'bundle' || itemType === 'custom-bundle') ? "Add to Bundle" : "Add to Cart";                
                // 2. Restore the correct color
                // If it's regular OR simple, set to Blue; otherwise Pink
                btn.style.background = (itemType === 'regular' || itemType === 'simple') ? "#395763" : "#e75480";
                
                // 3. Re-enable the button
                btn.disabled = false;
                
                // 4. Reset inputs
                if(fileInput) fileInput.value = "";
                msgInput.value = "";
                if(addonSelect) addonSelect.value = ""; 
                charCounter.textContent = "0/200";
                document.getElementById('note-wrap').classList.add('hidden');
                document.getElementById('upload-wrap').classList.add('hidden');
            }, 1000);
        };
        // Add this function anywhere in your <script>
function toggleSection(id) {
    const section = document.getElementById(id);
    section.classList.toggle('hidden');
}

// Update your simple item check to hide the toggles
if (itemType === 'simple') {
    document.getElementById('toggle-note').classList.add('hidden');
    document.getElementById('toggle-upload').classList.add('hidden');
    addonSection.style.display = 'none';
}
    </script>
</body>
</html>
