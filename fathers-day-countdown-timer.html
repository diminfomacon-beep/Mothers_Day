<div id="countdown-container" style="background-color:rgb(221, 236, 248); border-radius: 10px;">
  <div id="countdown-title" style="font-size: 30px; color:rgb(6, 6, 122)">⏳FATHER'S DAY IS ALMOST HERE!⌛</div>
  <div id="countdown-title" style="font-size: 25px; color:rgb(32, 82, 129)">😥DON'T WAIT FOR THE LAST MINUTE⏱️</div>
  <div id="countdown-title" style="font-size: 20px; color:rgb(122, 6, 12)">🎁Order By June 14, 2026 for guaranteed delivery📦</div>
  <div id="countdown" style="color:ffffff;">
    <div><span id="days">0</span><small>Days</small></div>
    <div><span id="hours">0</span><small>Hours</small></div>
    <div><span id="minutes">0</span><small>Minutes</small></div>
    <div><span id="seconds">0</span><small>Seconds</small></div> 
  </div>
</div>

<style>
#countdown-container {
  text-align: center;
  font-family: Arial, sans-serif;
  margin-top: 10px;
  padding: 10px 5px;
}

#countdown-title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 10px;
}

#countdown {
  display: flex;
  justify-content: center;
  gap: 5px;
}

#countdown div {
  background: #19829c;
  padding: 5px 5px;
  border-radius: 8px;
  min-width: 60px;
}

#countdown span {
  font-size: 22px;
  font-weight: bold;
  display: block;
}

#countdown small {
  font-size: 12px;
}
</style>

<script>
// 🔥 SET YOUR LAUNCH DATE HERE
const launchDate = new Date("June 14, 2026 00:00:00").getTime();

const timer = setInterval(function() {
  const now = new Date().getTime();
  const distance = launchDate - now;

  if (distance < 0) {
    clearInterval(timer);
    document.getElementById("countdown-container").innerHTML = "Still accepting order, ontime delivery no longer guaranteed";
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((distance / (1000 * 60)) % 60);
  const seconds = Math.floor((distance / 1000) % 60);

  document.getElementById("days").innerText = days;
  document.getElementById("hours").innerText = hours;
  document.getElementById("minutes").innerText = minutes;
  document.getElementById("seconds").innerText = seconds;
}, 1000);
</script>
